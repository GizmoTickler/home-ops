---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Go

on:
  pull_request:
    branches:
      - main
    paths:
      - cmd/homeops-cli/**
  push:
    branches:
      - main
    paths:
      - cmd/homeops-cli/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Go - Build / Lint / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/homeops-cli
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: cmd/homeops-cli/go.mod
          cache-dependency-path: cmd/homeops-cli/go.sum

      - name: Build
        run: go build ./...

      - name: Verify formatting
        run: |
          fmt_files=$(gofmt -l .)
          if [ -n "$fmt_files" ]; then
            echo "gofmt required on:" && echo "$fmt_files" && exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          working-directory: cmd/homeops-cli

      - name: Test
        run: go test -race -short -timeout 120s -count=1 ./...
