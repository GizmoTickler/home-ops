---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image Pull

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  extract:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Extract Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      default: ${{ steps.extract-default.outputs.images }}
      pull: ${{ steps.extract-pull.outputs.images }}
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout Default Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: default
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout Pull Request Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: pull
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Gather Default Branch Images
        uses: docker://ghcr.io/allenporter/flux-local:v8.3.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          args: >-
            get cluster
            --all-namespaces
            --path /github/workspace/default/kubernetes/flux/cluster
            --enable-images
            --only-images
            --output json
            --output-file default-images.json

      - name: Gather Pull Request Images
        uses: docker://ghcr.io/allenporter/flux-local:v8.3.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          args: >-
            get cluster
            --all-namespaces
            --path /github/workspace/pull/kubernetes/flux/cluster
            --enable-images
            --only-images
            --output json
            --output-file pull-images.json

      - name: Extract Default Images
        id: extract-default
        run: |-
          echo "images=$(jq --compact-output '.' default-images.json)" >> $GITHUB_OUTPUT
          echo '## Default branch images' >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          jq '.' default-images.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Extract Pull Request Images
        id: extract-pull
        run: |-
          echo "images=$(jq --compact-output '.' pull-images.json)" >> $GITHUB_OUTPUT
          echo '## Pull request images' >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          jq '.' pull-images.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  diff:
    if: ${{ needs.extract.outputs.default != needs.extract.outputs.pull }}
    needs: extract
    timeout-minutes: 5
    name: Image Pull - Diff Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.diff.outputs.images }}
    steps:
      - name: Diff Images
        id: diff
        run: |-
          images=$(jq --compact-output --null-input \
              --argjson f1 '${{ needs.extract.outputs.default }}' \
              --argjson f2 '${{ needs.extract.outputs.pull }}' \
              '$f2 - $f1' \
          )
          echo "images=${images}" >> $GITHUB_OUTPUT

          echo '## New images to Pull' >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo $images | jq >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  pull:
    if: ${{ needs.diff.outputs.images != '[]' }}
    needs: diff
    name: Image Pull - Pull Images
    runs-on: home-ops-runner
    timeout-minutes: 10
    strategy:
      matrix:
        image: ${{ fromJSON(needs.diff.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    env:
      MATRIX_IMAGE: ${{ matrix.image }}
    steps:
      - name: Install kubectl
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o "$HOME/.local/bin/kubectl"
          chmod +x "$HOME/.local/bin/kubectl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Flatcar+kubeadm replacement for `talosctl image pull`: kubelet on every node
      # pulls the image into containerd via a short-lived DaemonSet (spegel then
      # mirrors it across peers). Driven by the in-cluster home-ops-runner SA
      # (cluster-admin); no kubeconfig/talosctl/Talos machine API needed.
      - name: Pre-pull image on all nodes via transient DaemonSet
        env:
          NAMESPACE: actions-runner-system
        run: |
          set -euo pipefail
          NAME="image-pull-$(printf '%s' "$MATRIX_IMAGE" | sha256sum | cut -c1-12)"
          echo "Pre-pulling $MATRIX_IMAGE as DaemonSet $NAME in $NAMESPACE"

          cleanup() {
            kubectl -n "$NAMESPACE" delete daemonset "$NAME" --ignore-not-found --wait=false >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          # kubelet pulls the image BEFORE it tries to exec the container command, so we
          # override command with a guaranteed-nonexistent path: the pull still happens,
          # but the container fails to start instantly (StartError) instead of running the
          # real entrypoint. This is distroless-safe (no shell needed), avoids executing
          # arbitrary app code on every node (incl. control-plane), and never OOMKills — so
          # it produces no false KubernetesPodOOMKilled telemetry. The warm-detection below
          # already treats StartError/RunContainerError as "image present".
          # Tolerate all taints so it warms control-plane nodes too.
          kubectl apply --server-side -f - <<EOF
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: ${NAME}
            namespace: ${NAMESPACE}
            labels:
              app.kubernetes.io/managed-by: image-pull-workflow
          spec:
            selector:
              matchLabels:
                app: ${NAME}
            template:
              metadata:
                labels:
                  app: ${NAME}
              spec:
                terminationGracePeriodSeconds: 0
                automountServiceAccountToken: false
                tolerations:
                  - operator: Exists
                containers:
                  - name: prepull
                    image: "${MATRIX_IMAGE}"
                    imagePullPolicy: IfNotPresent
                    # Nonexistent path: kubelet pulls the image, then exec fails with
                    # StartError. The entrypoint never runs, so nothing to OOM and no
                    # memory limit needed.
                    command: ["/__prepull_noop_does_not_exist__"]
                    resources:
                      requests:
                        cpu: 5m
                        memory: 16Mi
          EOF

          DESIRED=$(kubectl get nodes --no-headers 2>/dev/null | wc -l | tr -d ' ')
          echo "Expecting image present on $DESIRED node(s)"

          deadline=$(( $(date +%s) + 480 ))
          while :; do
            states=$(kubectl -n "$NAMESPACE" get pods -l "app=${NAME}" \
              -o jsonpath='{range .items[*]}{.status.containerStatuses[0].state.waiting.reason}{"|"}{.status.containerStatuses[0].ready}{"|"}{.status.containerStatuses[0].state.running.startedAt}{"|"}{.status.containerStatuses[0].state.terminated.reason}{"\n"}{end}' 2>/dev/null || true)

            # Hard-fail on a genuine pull error (bad tag / nonexistent image).
            if printf '%s\n' "$states" | grep -Eq 'ErrImagePull|ImagePullBackOff|InvalidImageName|RegistryUnavailable'; then
              echo "::error::Image pull FAILED for ${MATRIX_IMAGE}"
              kubectl -n "$NAMESPACE" describe pods -l "app=${NAME}" || true
              exit 1
            fi

            # A node is warm once its pod is past the pull stage (running/terminated/
            # crashlooping = image present; only a pull-reason waiting state isn't).
            warmed=$(printf '%s\n' "$states" | grep -Ev '^\|' | grep -Ec 'true|[0-9]{4}-[0-9]{2}-[0-9]{2}T|Completed|Error|CrashLoopBackOff|RunContainerError|StartError' || true)
            echo "Warm nodes: ${warmed}/${DESIRED}"
            if [ "${warmed:-0}" -ge "$DESIRED" ] && [ "$DESIRED" -gt 0 ]; then
              echo "Image ${MATRIX_IMAGE} present on all ${DESIRED} node(s)"
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timed out warming ${MATRIX_IMAGE} (${warmed:-0}/${DESIRED} nodes)"
              kubectl -n "$NAMESPACE" describe pods -l "app=${NAME}" || true
              exit 1
            fi
            sleep 5
          done

  success:
    if: ${{ !cancelled() }}
    needs:
      - extract
      - diff
      - pull
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
