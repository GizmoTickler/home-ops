---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flux Reconcile

on:
  push:
    branches:
      - main
    paths:
      - kubernetes/**/*

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  filter:
    name: Flux Reconcile - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
      namespaces: ${{ steps.extract.outputs.namespaces }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e # v0.5.0
        with:
          patterns: kubernetes/**/*

      - name: Extract affected namespaces
        id: extract
        run: |
          namespaces=$(echo '${{ steps.changed-files.outputs.changed_files }}' \
            | jq -r '.[]' \
            | grep '^kubernetes/apps/' \
            | cut -d'/' -f3 \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "namespaces=$namespaces" >> $GITHUB_OUTPUT
          echo "Affected namespaces: $namespaces"

  reconcile:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flux Reconcile - Wait
    runs-on: home-ops-runner
    timeout-minutes: 10
    steps:
      - name: Install Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Install kubectl
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o "$HOME/.local/bin/kubectl"
          chmod +x "$HOME/.local/bin/kubectl"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Trigger Flux reconciliation
        run: |
          flux reconcile source git flux-system --timeout=5m
          flux reconcile kustomization cluster-apps --timeout=5m

      - name: Wait for all Kustomizations to reconcile
        run: |
          echo "Waiting for all Kustomizations to become ready..."
          kubectl wait kustomization.kustomize.toolkit.fluxcd.io --for=condition=Ready --all -A --timeout=5m 2>&1 || true

      - name: Wait for all HelmReleases to reconcile
        run: |
          echo "Waiting for all HelmReleases to become ready..."
          kubectl wait helmrelease.helm.toolkit.fluxcd.io --for=condition=Ready --all -A --timeout=5m 2>&1 || true

      - name: Wait for affected deployments to roll out
        env:
          NAMESPACES: ${{ needs.filter.outputs.namespaces }}
        run: |
          echo "## Rollout Status" >> $GITHUB_STEP_SUMMARY
          echo "$NAMESPACES" | jq -r '.[]' | while read -r ns; do
            echo "Checking rollouts in namespace: $ns"
            for deploy in $(kubectl get deployments -n "$ns" --no-headers -o custom-columns=':metadata.name' 2>/dev/null); do
              echo "  Waiting for deployment/$deploy in $ns..."
              if kubectl rollout status deployment/"$deploy" -n "$ns" --timeout=3m 2>&1; then
                echo "  ✓ $ns/$deploy rolled out" >> $GITHUB_STEP_SUMMARY
              else
                echo "  ✗ $ns/$deploy rollout failed" >> $GITHUB_STEP_SUMMARY
              fi
            done
            for sts in $(kubectl get statefulsets -n "$ns" --no-headers -o custom-columns=':metadata.name' 2>/dev/null); do
              echo "  Waiting for statefulset/$sts in $ns..."
              if kubectl rollout status statefulset/"$sts" -n "$ns" --timeout=3m 2>&1; then
                echo "  ✓ $ns/$sts rolled out" >> $GITHUB_STEP_SUMMARY
              else
                echo "  ✗ $ns/$sts rollout failed" >> $GITHUB_STEP_SUMMARY
              fi
            done
          done

      - name: Check for pod restarts in affected namespaces
        id: restarts
        env:
          NAMESPACES: ${{ needs.filter.outputs.namespaces }}
        run: |
          echo "## Pod Restart Check" >> $GITHUB_STEP_SUMMARY
          restarting=""
          echo "$NAMESPACES" | jq -r '.[]' | while read -r ns; do
            high_restarts=$(kubectl get pods -n "$ns" -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name} restarts={range .status.containerStatuses[*]}{.restartCount}{" "}{end}{"\n"}{end}' 2>/dev/null \
              | awk '{for(i=2;i<=NF;i++) if(split($i,a,"=")==2 && a[2]+0>=3) print $1" ("a[2]" restarts)"}')
            if [ -n "$high_restarts" ]; then
              echo "$high_restarts" >> /tmp/restarting_pods
            fi
          done
          if [ -f /tmp/restarting_pods ] && [ -s /tmp/restarting_pods ]; then
            echo "::warning::Pods with high restart counts detected"
            cat /tmp/restarting_pods
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/restarting_pods >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No high restart counts in affected namespaces" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verify Flux health
        id: health
        run: |
          failed=0
          summary=""

          not_ready_ks=$(kubectl get ks -A --no-headers | grep -v 'True' || true)
          if [ -n "$not_ready_ks" ]; then
            count=$(echo "$not_ready_ks" | wc -l | tr -d ' ')
            echo "::error::$count Kustomization(s) not ready after reconciliation"
            echo "$not_ready_ks"
            summary="${summary}${count} Kustomization(s) failed:\n${not_ready_ks}\n\n"
            echo '## Kustomization Status' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$not_ready_ks" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            failed=1
          fi

          not_ready_hr=$(kubectl get hr -A --no-headers | grep -v 'True' || true)
          if [ -n "$not_ready_hr" ]; then
            count=$(echo "$not_ready_hr" | wc -l | tr -d ' ')
            echo "::error::$count HelmRelease(s) not ready after reconciliation"
            echo "$not_ready_hr"
            summary="${summary}${count} HelmRelease(s) failed:\n${not_ready_hr}\n\n"
            echo '## HelmRelease Status' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$not_ready_hr" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            failed=1
          fi

          crash_pods=$(kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded --no-headers 2>/dev/null | grep -v 'Completed' || true)
          if [ -n "$crash_pods" ]; then
            count=$(echo "$crash_pods" | wc -l | tr -d ' ')
            echo "::warning::$count pod(s) not running"
            summary="${summary}${count} pod(s) unhealthy:\n${crash_pods}"
            echo '## Pod Health' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$crash_pods" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$failed" -eq 0 ]; then
            echo "All Kustomizations, HelmReleases, and pods healthy" >> $GITHUB_STEP_SUMMARY
          fi

          echo "failed=$failed" >> $GITHUB_OUTPUT
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo -e "$summary" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Pushover alert on failure
        if: ${{ steps.health.outputs.failed == '1' }}
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER_KEY }}
          SUMMARY: ${{ steps.health.outputs.summary }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          msg=$(echo -e "$SUMMARY" | head -c 1024)
          curl -s -f -X POST https://api.pushover.net/1/messages.json \
            --form-string "token=$PUSHOVER_TOKEN" \
            --form-string "user=$PUSHOVER_USER" \
            --form-string "priority=1" \
            --form-string "title=Flux Reconcile Failed" \
            --form-string "message=$msg" \
            --form-string "url=$RUN_URL" \
            --form-string "url_title=View workflow run"

      - name: Fail if unhealthy
        if: ${{ steps.health.outputs.failed == '1' }}
        run: exit 1
