---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Release - homeops-cli
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/homeops-cli
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: cmd/homeops-cli/go.mod
          cache-dependency-path: cmd/homeops-cli/go.sum

      - name: Build binaries
        run: |
          # Artifacts go outside the checkout: writing into the repo tree marks
          # the VCS state dirty, which taints the version stamp of later builds.
          dist="$RUNNER_TEMP/dist"
          mkdir -p "$dist"
          for platform in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            goos="${platform%/*}"; goarch="${platform#*/}"
            out="$dist/homeops-cli_${GITHUB_REF_NAME}_${goos}_${goarch}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
              -ldflags "-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA::8} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "$out" .
            tar -czf "${out}.tar.gz" -C "$dist" "$(basename "$out")"
            rm "$out"
          done
          (cd "$dist" && sha256sum ./*.tar.gz > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "homeops-cli $GITHUB_REF_NAME" \
            --generate-notes \
            "$RUNNER_TEMP"/dist/*.tar.gz "$RUNNER_TEMP"/dist/checksums.txt
