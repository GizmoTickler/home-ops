---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Claude Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  claude-review:
    if: github.event.pull_request.user.type != 'Bot'
    name: Claude Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |-
            Review this pull request for a Kubernetes GitOps home-ops repository. Focus on:
            - Kubernetes manifest correctness (resource limits, probes, security contexts)
            - Helm values and Flux Kustomization correctness
            - SOPS/secrets not accidentally exposed in plain text
            - Container image pinning (digests preferred, no :latest)
            - HelmRelease/Kustomization dependency ordering
            - Network policy and RBAC scope
            Be concise. Only comment on actual issues, not style preferences.
