---
version: v1alpha1
machine:
  ca:
    crt: secret://talos_machine_ca_crt
  certSANs:
    - 127.0.0.1
{{ ENV.TALOS_EXTRA_CERT_SANS_MACHINE }}
  features:
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: false
      resolveMemberNames: true
    kubePrism:
      enabled: true
      port: 7445
    rbac: true
  files:
    - op: create
      path: /etc/cri/conf.d/20-customization.part
      content: |
        [plugins."io.containerd.cri.v1.images"]
          discard_unpacked_layers = false
        [plugins."io.containerd.cri.v1.runtime"]
          device_ownership_from_security_context = true
    - op: overwrite
      path: /etc/nfsmount.conf
      permissions: 0o644
      content: |
        [ NFSMount_Global_Options ]
        nfsvers=4.2
        hard=True
        nconnect=16
        noatime=True
  install:
    disk: {{ ENV.TALOS_WORKER_INSTALL_DISK }}
    image: factory.talos.dev/installer/c682c3b7e2747ecadb2b2f9eb73336e40373cfbe6f7ec588336ece6f3a1059cf:{{ ENV.TALOS_VERSION }}
    wipe: false
  kernel:
    modules:
      - name: nbd
      - name: nvme_tcp
      - name: vfio-pci
      - name: uio_pci_generic
  kubelet:
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    extraConfig:
      featureGates:
        ImageVolume: true
      serializeImagePulls: false
    image: ghcr.io/siderolabs/kubelet:{{ ENV.TALOS_KUBERNETES_VERSION }}
    nodeIP:
      validSubnets:
        - {{ ENV.NODE_SUBNET }}
  nodeLabels:
    topology.kubernetes.io/region: main
    topology.kubernetes.io/zone: m
  sysctls:
    fs.inotify.max_user_instances: "8192"
    fs.inotify.max_user_watches: "1048576"
    net.core.default_qdisc: fq
    net.core.rmem_max: "67108864"
    net.core.wmem_max: "67108864"
    net.ipv4.neigh.default.gc_thresh1: "4096"
    net.ipv4.neigh.default.gc_thresh2: "8192"
    net.ipv4.neigh.default.gc_thresh3: "16384"
    net.ipv4.tcp_congestion_control: bbr
    net.ipv4.tcp_fastopen: "3"
    net.ipv4.tcp_mtu_probing: "1"
    net.ipv4.tcp_rmem: 4096 87380 33554432
    net.ipv4.tcp_window_scaling: "1"
    net.ipv4.tcp_wmem: 4096 65536 33554432
    sunrpc.tcp_max_slot_table_entries: "128"
    sunrpc.tcp_slot_table_entries: "128"
    user.max_user_namespaces: "11255"
    vm.nr_hugepages: "1024"
  token: secret://talos_machine_token
cluster:
  ca:
    crt: secret://talos_cluster_ca_crt
  clusterName: {{ ENV.CLUSTER_NAME }}
  controlPlane:
    endpoint: secret://talos_k8s_endpoint
  id: secret://talos_cluster_id
  network:
    cni:
      name: none
    dnsDomain: {{ ENV.DNS_DOMAIN }}
    podSubnets:
      - {{ ENV.POD_CIDR }}
    serviceSubnets:
      - {{ ENV.SERVICE_CIDR }}
  secret: secret://talos_cluster_secret
  token: secret://talos_cluster_token
