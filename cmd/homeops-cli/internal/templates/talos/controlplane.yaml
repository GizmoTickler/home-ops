---
version: v1alpha1
machine:
  type: controlplane
  ca:
    crt: secret://talos_machine_ca_crt
    key: secret://talos_machine_ca_key
  certSANs:
    - 127.0.0.1
{{ ENV.TALOS_EXTRA_CERT_SANS_MACHINE }}
  features:
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: false
      resolveMemberNames: true
    kubePrism:
      enabled: true
      port: 7445
    kubernetesTalosAPIAccess:
      allowedKubernetesNamespaces:
        - actions-runner-system
        - system-upgrade
      allowedRoles:
        - os:admin
      enabled: true
    rbac: true
  files:
    - op: create
      path: /etc/cri/conf.d/20-customization.part
      content: |
        [plugins."io.containerd.cri.v1.images"]
          discard_unpacked_layers = false
        [plugins."io.containerd.cri.v1.runtime"]
          device_ownership_from_security_context = true
    - op: overwrite
      path: /etc/nfsmount.conf
      permissions: 0o644
      content: |
        [ NFSMount_Global_Options ]
        nfsvers=4.2
        hard=True
        nconnect=16
        noatime=True
        rsize=1048576
        wsize=1048576
  install:
    disk: {{ ENV.TALOS_CONTROLPLANE_INSTALL_DISK }}
    image: factory.talos.dev/installer/c682c3b7e2747ecadb2b2f9eb73336e40373cfbe6f7ec588336ece6f3a1059cf:{{ ENV.TALOS_VERSION }}
    wipe: false
  kernel:
    modules:
      - name: nbd
      - name: nvme_tcp
      - name: vfio-pci
      - name: uio_pci_generic
  kubelet:
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    extraConfig:
      serializeImagePulls: false
    image: ghcr.io/siderolabs/kubelet:{{ ENV.TALOS_KUBERNETES_VERSION }}
    nodeIP:
      validSubnets:
        - {{ ENV.NODE_SUBNET }}
  nodeLabels:
    topology.kubernetes.io/region: main
    topology.kubernetes.io/zone: m
  sysctls:
    fs.inotify.max_user_watches: 1048576 # Watchdog
    fs.inotify.max_user_instances: 8192 # Watchdog
    net.core.default_qdisc: fq # 10Gb/s
    # Increase max socket buffers
    net.core.rmem_max: "134217728" # 128MB (was 64MB)
    net.core.wmem_max: "134217728" # 128MB (was 64MB)
    # Increase TCP buffer auto-tuning range
    net.ipv4.tcp_rmem: "4096 87380 67108864" # min 4KB, default 87KB, max 64MB (was 32MB)
    net.ipv4.tcp_wmem: "4096 65536 67108864" # min 4KB, default 64KB, max 64MB (was 32MB)
    net.ipv4.tcp_congestion_control: bbr # 10Gb/s
    net.ipv4.tcp_fastopen: 3 # Send and accept data in the opening SYN packet
    net.ipv4.tcp_mtu_probing: 1 # 10Gb/s | Jumbo frames
    net.ipv4.tcp_notsent_lowat: "131072" # 10Gb/s | Cloudflared / QUIC
    net.ipv4.tcp_window_scaling: 1 # 10Gb/s
    net.core.netdev_max_backlog: "16384" # Default 1000, helps with packet bursts
    net.core.somaxconn: "8192" # Listen backlog for busy servers
    net.ipv4.tcp_slow_start_after_idle: "0" # Don't reset cwnd after idle (helps NFS)
    net.ipv4.tcp_tw_reuse: "1" # Reuse TIME_WAIT sockets (many connections)
    sunrpc.tcp_slot_table_entries: 128 # 10Gb/s | NFS
    sunrpc.tcp_max_slot_table_entries: 128 # 10Gb/s | NFS
    user.max_user_namespaces: 11255 # User Namespaces
    vm.nr_hugepages: 1024 # HugePages
  token: secret://talos_machine_token
cluster:
  ca:
    crt: secret://talos_cluster_ca_crt
    key: secret://talos_cluster_ca_key
  clusterName: {{ ENV.CLUSTER_NAME }}
  controlPlane:
    endpoint: secret://talos_k8s_endpoint
  id: secret://talos_cluster_id
  network:
    cni:
      name: none
    dnsDomain: {{ ENV.DNS_DOMAIN }}
    podSubnets:
      - {{ ENV.POD_CIDR }}
    serviceSubnets:
      - {{ ENV.SERVICE_CIDR }}
  secret: secret://talos_cluster_secret
  token: secret://talos_cluster_token
  aggregatorCA:
    crt: secret://talos_aggregator_ca_crt
    key: secret://talos_aggregator_ca_key
  allowSchedulingOnControlPlanes: true
  apiServer:
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
    certSANs:
      - 127.0.0.1
      - 192.168.120.100
{{ ENV.TALOS_EXTRA_CERT_SANS_APISERVER }}
    disablePodSecurityPolicy: true
    extraArgs:
      enable-aggregator-routing: "true"
    image: registry.k8s.io/kube-apiserver:{{ ENV.TALOS_KUBERNETES_VERSION }}
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
      feature-gates: HPAScaleToZero=true
    image: registry.k8s.io/kube-controller-manager:{{ ENV.TALOS_KUBERNETES_VERSION }}
  coreDNS:
    disabled: true
  etcd:
    advertisedSubnets:
      - {{ ENV.NODE_SUBNET }}
    ca:
      crt: secret://talos_etcd_ca_crt
      key: secret://talos_etcd_ca_key
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
  proxy:
    disabled: true
    image: registry.k8s.io/kube-proxy:{{ ENV.TALOS_KUBERNETES_VERSION }}
  scheduler:
    config:
      apiVersion: kubescheduler.config.k8s.io/v1
      kind: KubeSchedulerConfiguration
      profiles:
        - schedulerName: default-scheduler
          plugins:
            score:
              disabled:
                - name: ImageLocality
          # PodTopologySpread defaultConstraints removed: the bare int `maxSkew: 1`
          # in this passthrough config map crashes Talos >=v1.13.3's static-pod
          # render controller ("cannot deep copy int"), taking the whole control
          # plane down. Restore via a mounted KubeSchedulerConfiguration file once
          # the upstream Talos deep-copy regression is fixed.
    extraArgs:
      bind-address: 0.0.0.0
    image: registry.k8s.io/kube-scheduler:{{ ENV.TALOS_KUBERNETES_VERSION }}
  secretboxEncryptionSecret: secret://talos_secretbox_encryption_secret
  serviceAccount:
    key: secret://talos_service_account_key
