# /etc/containerd/config.toml — containerd 2.x (config version 3).
# Ports Talos's /etc/cri/conf.d/20-customization.part + adds kubeadm requirements
# (systemd cgroups, pinned pause image). VERIFY plugin keys/version against the containerd
# shipped by the Flatcar sysext bundle (2.x uses io.containerd.cri.v1.*; 1.x uses io.containerd.grpc.v1.cri).
version = 3

[plugins.'io.containerd.cri.v1.images']
  # Talos: discard_unpacked_layers = false
  discard_unpacked_layers = false
  [plugins.'io.containerd.cri.v1.images'.pinned_images]
    sandbox = '{{ ENV.PAUSE_IMAGE }}'

[plugins.'io.containerd.cri.v1.runtime']
  # Talos: device_ownership_from_security_context = true
  device_ownership_from_security_context = true
  [plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.runc]
    runtime_type = 'io.containerd.runc.v2'
    [plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.runc.options]
      # kubeadm + kubelet cgroupDriver=systemd require this on the runtime side
      SystemdCgroup = true
