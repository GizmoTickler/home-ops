# KubeSchedulerConfiguration — port of Talos cluster.scheduler.config.
# Disables the ImageLocality score plugin (so the scheduler doesn't bias pods toward nodes
# that already cached the image). Mounted into the scheduler static pod at
# /etc/kubernetes/scheduler/config.yaml (see init-config scheduler.extraArgs config=...).
#
# NOTE: Talos dropped the PodTopologySpread defaultConstraints because a bare int maxSkew
# crashed Talos's static-pod render controller ("cannot deep copy int"). That was a Talos
# bug; kubeadm/upstream kube-scheduler does NOT have it. We can re-add default topology
# spread constraints here later if desired.
apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
clientConnection:
  kubeconfig: /etc/kubernetes/scheduler.conf
profiles:
  - schedulerName: default-scheduler
    plugins:
      score:
        disabled:
          - name: ImageLocality
