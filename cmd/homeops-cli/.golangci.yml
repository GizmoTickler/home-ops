# golangci-lint v2 configuration for homeops-cli.
# Defaults (errcheck, govet, ineffassign, staticcheck, unused) plus a few
# cheap always-good linters. Keep this list short and the build green.
version: "2"

linters:
  enable:
    - misspell
    - unconvert
    - usestdlibvars

issues:
  # Surface everything; the codebase is expected to stay at zero.
  max-issues-per-linter: 0
  max-same-issues: 0
