---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: netbox-postgres
  annotations:
    # Allow a recovered cluster to archive back to its own (non-empty) serverName.
    # Safe for our DR model: a full rebuild destroys the old cluster BEFORE recovery,
    # so there is never a second writer to this barman store. Without this, a future
    # rebuild recovering from + archiving to netbox-postgres-v2 would fail the
    # restore-time empty-archive check.
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  # PostgreSQL 16 with 3 instances for HA
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  # Use superuser secret from 1Password
  superuserSecret:
    name: netbox-postgres-superuser-secret

  # Primary update strategy
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover

  # Storage configuration
  storage:
    size: 10Gi
    storageClass: scale-nvmeof

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

  # PostgreSQL configuration
  postgresql:
    parameters:
      # Performance tuning for small instance
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
      maintenance_work_mem: "64MB"
      work_mem: "16MB"
      # Logging
      log_statement: "ddl"
      log_checkpoints: "on"
      log_lock_waits: "on"
      # NetBox recommended settings
      max_connections: "100"

  # Backup configuration to TrueNAS S3
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/netbox-postgres
      endpointURL: https://s3.${SECRET_DOMAIN}
      # Ongoing backups go to a NEW serverName (empty) so CNPG's restore-time
      # "expected empty archive" check passes; recovery SOURCE below reads the old
      # serverName (netbox-postgres) where the pre-migration data lives.
      serverName: netbox-postgres-v2
      s3Credentials:
        accessKeyId:
          name: netbox-postgres-s3-secret
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: netbox-postgres-s3-secret
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
    retentionPolicy: "14d"

  # Enable monitoring
  monitoring:
    enablePodMonitor: true

  # Bootstrap by RECOVERING from the barman object store.
  # After the Talos->Flatcar cluster rebuild, an initdb bootstrap created an EMPTY
  # netbox DB. The real pre-migration data lives in s3://cnpg-backups/netbox-postgres
  # (serverName netbox-postgres). Recovery restores it and reuses the same systemid,
  # so the cluster can resume archiving to the same store (no \"expected empty archive\"
  # conflict the way a fresh initdb hit). This is also the steady-state DR config.
  bootstrap:
    recovery:
      source: netbox-postgres-backup
      # Pin the base backup: the 2026-07-21 premigrate backup's checkpoint WAL
      # (…5A) was never archived before the old cluster was destroyed, so that
      # backup is unrestorable. 20260721T000301 + WAL replay through …59 covers
      # everything (NetBox writes stopped before the archive tail).
      recoveryTarget:
        backupID: "20260721T000301"
  externalClusters:
    - name: netbox-postgres-backup
      barmanObjectStore:
        destinationPath: s3://cnpg-backups/netbox-postgres
        endpointURL: https://s3.${SECRET_DOMAIN}
        # Recover from the LIVE backup lineage (netbox-postgres-v2). The original
        # pre-migration archive at serverName netbox-postgres is frozen/historical.
        serverName: netbox-postgres-v2
        s3Credentials:
          accessKeyId:
            name: netbox-postgres-s3-secret
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: netbox-postgres-s3-secret
            key: ACCESS_SECRET_KEY
        wal:
          maxParallel: 2

  # Anti-affinity for HA across nodes
  affinity:
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
---
# Application user credentials (will be created by initdb)
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-postgres-app
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: netbox-postgres-app-secret
    template:
      engineVersion: v2
      data:
        username: netbox
        password: "{{ .NETBOX_DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: netbox-postgres
---
# Scheduled backup configuration
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: netbox-postgres-daily
spec:
  schedule: "0 3 * * *"
  backupOwnerReference: self
  immediate: true
  cluster:
    name: netbox-postgres
