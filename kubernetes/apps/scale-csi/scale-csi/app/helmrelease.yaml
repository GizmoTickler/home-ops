---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scale-csi
spec:
  chartRef:
    kind: OCIRepository
    name: scale-csi
  interval: 1h
  values:
    # Backend publication fencing. additive = per-publish node grants added
    # alongside the static allowlist; the chart enforces a Recreate controller
    # strategy in this mode. Flipped 2026-07-22 after the v1.2.23 quad-review.
    # strict is deferred until the deferred-fencing metric soaks at zero.
    fencing:
      mode: "additive"
    truenas:
      host: "nas01.${SECRET_DOMAIN}"
      port: 443
      secure: true
      skipTLSVerify: false
      existingSecret: scale-csi-secret
    zfs:
      parentDataset: flashstor/scale-csi
      enforceQuota: true
      # VolSync restores create the app PVC from a VolumeSnapshot; make it a full
      # independent copy (zfs send|recv) instead of a dependent clone so the
      # restore intermediate is deletable and no orphan Released PV is left behind.
      detachedVolumesFromSnapshots: true
    nfs:
      enabled: true
      server: "192.168.120.10"
      shareAllowedNetworks:
        - 192.168.122.10/32
        - 192.168.122.11/32
        - 192.168.122.12/32
    iscsi:
      enabled: true
      portal: "192.168.120.10:3260"
    nvmeof:
      enabled: true
      transport: tcp
      address: "192.168.120.10"
      port: 4420
      # Secure-by-default: only these Kubernetes node NQNs may connect
      # (nvme show-hostnqn per node; machine-id-derived, stable on Flatcar).
      subsystemAllowAnyHost: false
      subsystemHosts:
        - nqn.2014-08.org.nvmexpress:uuid:cce109e7-813a-4b2b-9314-c35b7064e3dd
        - nqn.2014-08.org.nvmexpress:uuid:0c2178cc-5aa6-45f3-bafe-718fe518fa62
        - nqn.2014-08.org.nvmexpress:uuid:2121dcbe-603f-46ec-b21a-b3dbad9d5f04
    storageClasses:
      - name: scale-nvmeof
        protocol: nvmeof
        isDefault: true
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: Immediate
      - name: scale-iscsi
        protocol: iscsi
        isDefault: false
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: Immediate
      - name: scale-nfs
        protocol: nfs
        isDefault: false
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: Immediate
        mountOptions:
          - nfsvers=4
          - noatime
    snapshotClass:
      create: true
      name: scale-snapshot
      deletionPolicy: Delete
    reconcile:
      delete:
        # Gated GC: nightly CronJob releases spent VolSync-restore snapshots and
        # deletes true orphans (>24h old, capped 20/run, guarded delete paths,
        # fails closed during cluster rebuilds). Detection/alerting is always on.
        enabled: true
        maxPerRun: 20
