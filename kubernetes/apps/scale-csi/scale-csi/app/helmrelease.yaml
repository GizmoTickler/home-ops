---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scale-csi
spec:
  chartRef:
    kind: OCIRepository
    name: scale-csi
  interval: 1h
  values:
    # 2026-07-22 OOM incident: chart-default 256Mi controller limit is too small —
    # zfs.resource.snapshot.query returns ~29MB JSON per call at current snapshot
    # count (inherited tombstone-ledger props amplify every entry), and concurrent
    # VolSync CreateVolume-from-snapshot + strict-fencing startup reconcile pushed
    # the heap past the limit (crash loop, 12 restarts). 1Gi is headroom until the
    # batch-14 driver fix (single-fetch + ledger relocation) lands.
    controller:
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 1Gi
    # Backend publication fencing. strict = backend allowlists converge to CSI
    # publications only (static subsystemHosts ignored for fenced volumes);
    # flipped 2026-07-22 after additive verification (27/27 converged,
    # deferred=0, double-mount drill passed).
    fencing:
      mode: "strict"
    truenas:
      host: "nas01.${SECRET_DOMAIN}"
      port: 443
      secure: true
      skipTLSVerify: false
      existingSecret: scale-csi-secret
    zfs:
      parentDataset: flashstor/scale-csi
      enforceQuota: true
      # 2026-07-22: reverted to dependent clones. detached copies (zfs send|recv via
      # replication.run_onetime) were only needed for the one-time Rook->scale-csi
      # migration (now complete). In steady state the dominant snapshot->PVC caller is
      # VolSync's HOURLY per-app source-backup mount (copyMethod: Snapshot), for which a
      # full dataset copy every hour is wasteful AND was wedging TrueNAS's replication
      # subsystem (jobs stuck at 0%, orphaned by the driver's abandon-on-timeout).
      # Clones are instant and VolSync deletes the temp source PVC before its snapshot,
      # so the clone dependency always resolves cleanly. Per-StorageClass detached
      # opt-in for real DR restores is tracked in Batch E.
      detachedVolumesFromSnapshots: false
    nfs:
      enabled: true
      server: "192.168.120.10"
      shareAllowedNetworks:
        - 192.168.122.10/32
        - 192.168.122.11/32
        - 192.168.122.12/32
    iscsi:
      enabled: true
      portal: "192.168.120.10:3260"
    nvmeof:
      enabled: true
      transport: tcp
      address: "192.168.120.10"
      port: 4420
      # Secure-by-default: only these Kubernetes node NQNs may connect
      # (nvme show-hostnqn per node; machine-id-derived, stable on Flatcar).
      subsystemAllowAnyHost: false
      subsystemHosts:
        - nqn.2014-08.org.nvmexpress:uuid:cce109e7-813a-4b2b-9314-c35b7064e3dd
        - nqn.2014-08.org.nvmexpress:uuid:0c2178cc-5aa6-45f3-bafe-718fe518fa62
        - nqn.2014-08.org.nvmexpress:uuid:2121dcbe-603f-46ec-b21a-b3dbad9d5f04
    storageClasses:
      - name: scale-nvmeof
        protocol: nvmeof
        isDefault: true
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: Immediate
      - name: scale-iscsi
        protocol: iscsi
        isDefault: false
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: Immediate
      - name: scale-nfs
        protocol: nfs
        isDefault: false
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: Immediate
        mountOptions:
          - nfsvers=4
          - noatime
    snapshotClass:
      create: true
      name: scale-snapshot
      deletionPolicy: Delete
    reconcile:
      # 2026-07-23: relocate tombstone ledger + in-flight markers off the
      # inheritable parent dataset (v1.2.31 batch 14). Root cause of the
      # 2026-07-22 controller OOM loop: dependent-clone deferred deletes wrote
      # ledger entries (+16/h) as inheritable parent properties, so every
      # snapshot carried the full ledger -> 35MB snapshot-query payloads.
      # Writes go to a non-inheriting .csi-bookkeeping child with lossless
      # dual-read migration; cleanupParent stays default-off for first soak
      # (parent entries dual-read until explicitly cleaned).
      bookkeeping:
        enabled: true
      delete:
        # Gated GC: nightly CronJob releases spent VolSync-restore snapshots and
        # deletes true orphans (>24h old, capped 20/run, guarded delete paths,
        # fails closed during cluster rebuilds). Detection/alerting is always on.
        enabled: true
        maxPerRun: 20
