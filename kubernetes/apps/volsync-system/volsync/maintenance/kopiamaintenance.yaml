---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
  namespace: volsync
spec:
  enabled: true
  trigger:
    schedule: 0 */8 * * *
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          path: /mnt/flashstor/VolsyncKopia
          server: 192.168.120.10
  repository:
    repository: volsync-maintenance-secret
