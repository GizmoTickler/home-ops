---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: Backend
metadata:
  name: pocket-id-oidc-flux-web
spec:
  type: Static
  static:
    hosts:
      - host: pocket-id.auth.svc.cluster.local
        port: 1411
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: flux-web-oidc
spec:
  oauth2:
    backendRef:
      kind: Backend
      group: gateway.kgateway.dev
      name: pocket-id-oidc-flux-web
    authorizationEndpoint: https://id.${SECRET_DOMAIN}/authorize
    tokenEndpoint: https://id.${SECRET_DOMAIN}/api/oidc/token
    endSessionEndpoint: https://id.${SECRET_DOMAIN}/api/oidc/end-session
    credentials:
      clientID: 6e3a1620-4514-4ed7-b30d-2a3a42af2ccc
      clientSecretRef:
        name: flux-web-oidc-secret
    redirectURI: https://flux.${SECRET_DOMAIN}/oauth2/callback
    logoutPath: /oauth2/logout
    scopes:
      - openid
      - email
      - profile
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: flux-web-oidc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: flux-web
  oauth2:
    extensionRef:
      name: flux-web-oidc
