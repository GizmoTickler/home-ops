---
# Gateway-level defaults: compression, retry, and timeout configuration
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: default-backend
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: kgateway-internal
      sectionName: https
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: kgateway-external
      sectionName: https
  compression:
    responseCompression: {}
  retry:
    attempts: 3
    retryOn:
      - reset
      - connect-failure
      - retriable-status-codes
    statusCodes:
      - 502
      - 503
      - 504
    perTryTimeout: 30s
    backoffBaseInterval: 250ms
  timeouts:
    request: 300s
    streamIdle: 300s
---
# Listener-level settings: headers, timeouts, WebSocket support
apiVersion: gateway.kgateway.dev/v1alpha1
kind: HTTPListenerPolicy
metadata:
  name: default-listener
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: kgateway-internal
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: kgateway-external
  useRemoteAddress: true
  xffNumTrustedHops: 0
  streamIdleTimeout: 300s
  idleTimeout: 3600s
  upgradeConfig:
    enabledUpgrades:
      - websocket
  earlyRequestHeaderModifier:
    set:
      - name: X-Forwarded-Proto
        value: https
      - name: X-Real-IP
        value: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
