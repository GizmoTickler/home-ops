---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app powerdns
spec:
  chartRef:
    kind: OCIRepository
    name: powerdns
  interval: 1h
  values:
    fullnameOverride: external-dns-powerdns
    provider:
      name: pdns
    env:
      - name: EXTERNAL_DNS_PDNS_SERVER
        value: "http://192.168.123.249:8081"
      - name: EXTERNAL_DNS_PDNS_API_KEY
        valueFrom:
          secretKeyRef:
            name: &secret powerdns-secret
            key: PDNS_API_KEY
      - name: EXTERNAL_DNS_PDNS_SERVER_ID
        value: "localhost"
    extraArgs:
      - --interval=1h
    triggerLoopOnEvent: true
    policy: sync
    sources:
      - gateway-httproute
      - service
    txtOwnerId: powerdns
    txtPrefix: "k8s."
    domainFilters:
      - ${SECRET_DOMAIN}
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 1Gi
