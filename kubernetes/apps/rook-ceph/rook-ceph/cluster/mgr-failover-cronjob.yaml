---
# Scheduled seamless ceph-mgr failover to work around the active-mgr memory
# leak on Ceph v20.2.2 "Tentacle" (active mgr climbs ~110Mi/h to its 3Gi limit
# and is OOM-killed ~every 25h; the flat standby is promoted). Every 12h this
# runs `ceph mgr fail <active>` to hand off to the standby BEFORE the leaking
# active reaches its limit — zero client-facing impact (mgr is not in the data
# path). Remove once the cluster is upgraded off a leaking Tentacle release.
#
# The pod template mirrors the rook-ceph-tools deployment VERBATIM (same image,
# serviceAccountName, env, volumeMounts, volumes and the keyring/ceph.conf
# preamble) so ceph auth is guaranteed to work; only the trailing
# watch_endpoints tail is swapped for the failover logic. Namespace is injected
# by the `rook-ceph-cluster` Flux Kustomization's targetNamespace (rook-ceph),
# matching the sibling securitypolicy.yaml convention.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rook-ceph-mgr-failover
  labels:
    app: rook-ceph-mgr-failover
spec:
  schedule: "0 */12 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: rook-ceph-mgr-failover
        spec:
          serviceAccountName: rook-ceph-default
          restartPolicy: Never
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          containers:
            - name: mgr-failover
              image: quay.io/ceph/ceph:v20.2.2
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsUser: 2016
                runAsGroup: 2016
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              env:
                - name: ROOK_CEPH_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: rook-ceph-mon
                      key: ceph-username
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  # --- rook-ceph-tools keyring/ceph.conf preamble (verbatim) ---
                  CEPH_CONFIG="/etc/ceph/ceph.conf"
                  MON_CONFIG="/etc/rook/mon-endpoints"
                  KEYRING_FILE="/etc/ceph/keyring"
                  CONFIG_OVERRIDE="/etc/rook-config-override/config"

                  write_endpoints() {
                    endpoints=$(cat ${MON_CONFIG})
                    # filter out the mon names, keep host:port list
                    # shellcheck disable=SC2001
                    mon_endpoints=$(echo "${endpoints}" | sed 's/[a-z0-9_-]\+=//g')
                    DATE=$(date)
                    echo "$DATE writing mon endpoints to ${CEPH_CONFIG}: ${endpoints}"
                    cat <<EOF > ${CEPH_CONFIG}
                  [global]
                  mon_host = ${mon_endpoints}

                  [client.admin]
                  keyring = ${KEYRING_FILE}
                  EOF
                    if [ -f "${CONFIG_OVERRIDE}" ] && [ -s "${CONFIG_OVERRIDE}" ]; then
                      echo "$DATE merging config override from ${CONFIG_OVERRIDE}"
                      echo "" >> ${CEPH_CONFIG}
                      cat ${CONFIG_OVERRIDE} >> ${CEPH_CONFIG}
                    fi
                  }

                  # read the secret from an env var (backward compat) or the secret file
                  ceph_secret=${ROOK_CEPH_SECRET:-}
                  if [[ "$ceph_secret" == "" ]]; then
                    ceph_secret=$(cat /var/lib/rook-ceph-mon/secret.keyring)
                  fi

                  cat <<EOF > ${KEYRING_FILE}
                  [${ROOK_CEPH_USERNAME}]
                  key = ${ceph_secret}
                  EOF

                  write_endpoints
                  # --- end verbatim preamble ---

                  # Seamlessly recycle the leaking active mgr onto the flat standby.
                  ACTIVE=$(ceph mgr stat -f json | jq -r '.active_name')
                  echo "active mgr: ${ACTIVE}"
                  if [ -n "${ACTIVE}" ] && [ "${ACTIVE}" != "null" ]; then
                    ceph mgr fail "${ACTIVE}"
                    echo "failed over ${ACTIVE}"
                  else
                    echo "could not determine active mgr; skipping" >&2
                    exit 1
                  fi
              volumeMounts:
                - name: ceph-config
                  mountPath: /etc/ceph
                - name: mon-endpoint-volume
                  mountPath: /etc/rook
                - name: ceph-admin-secret
                  mountPath: /var/lib/rook-ceph-mon
                - name: rook-config-override
                  mountPath: /etc/rook-config-override
                  readOnly: true
          volumes:
            - name: ceph-admin-secret
              secret:
                secretName: rook-ceph-mon
                optional: false
                items:
                  - key: ceph-secret
                    path: secret.keyring
            - name: mon-endpoint-volume
              configMap:
                name: rook-ceph-mon-endpoints
                items:
                  - key: data
                    path: mon-endpoints
            - name: rook-config-override
              configMap:
                name: rook-config-override
                optional: true
            - name: ceph-config
              emptyDir: {}
