---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: rook-ceph
  upgrade:
    cleanupOnFail: false
  values:
    # CSI settings (incl. cephFSKernelMountOptions) moved out of this chart in
    # Rook v1.20 — they now live on the Driver CRs managed by the ceph-csi-drivers
    # HelmRelease (see ../csi/). Custom CSI images, if pinned, still go here.
    image:
      repository: ghcr.io/rook/ceph
    monitoring:
      enabled: true
    resources:
      requests:
        memory: 128Mi
        cpu: 350m
      limits:
        memory: 4Gi
