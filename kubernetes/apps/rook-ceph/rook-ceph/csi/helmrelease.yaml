---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.1
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: rook-ceph
  upgrade:
    cleanupOnFail: false
  values:
    # Rook v1.20 removed the CSI plugin ServiceAccounts + RBAC from the
    # rook-ceph operator chart and moved them to this ceph-csi-drivers chart.
    # This release recreates ONLY those ServiceAccounts + plugin RBAC.
    #
    # The OperatorConfig, the two Driver CRs (rook-ceph.rbd.csi.ceph.com /
    # rook-ceph.cephfs.csi.ceph.com) and the image-set ConfigMap already exist
    # live and are reconciled by the ceph-csi-operator. We must NOT let this
    # chart create competing copies:
    #   - operatorConfig.create=false  -> do not render an OperatorConfig.
    #   - Driver CRs cannot be disabled independently of the SAs/RBAC (both are
    #     gated on drivers.<name>.enabled), so the chart still renders Driver
    #     objects. Those are stripped by the postRenderer below.
    #
    # Driver names are set to the SHORT form (rbd / cephfs) on purpose: the
    # chart derives the ServiceAccount/RBAC names from normalizeDriverName, and
    # the live ceph-csi-operator (CSI_SERVICE_ACCOUNT_PREFIX="") expects the
    # short SA names rbd-ctrlplugin-sa / cephfs-ctrlplugin-sa / *-nodeplugin-sa.
    operatorConfig:
      create: false
    drivers:
      rbd:
        name: rbd
        enabled: true
      cephfs:
        name: cephfs
        enabled: true
      # nfs and nvmeof drivers are not deployed in this cluster (no live Driver
      # CRs, no deployments referencing their SAs) -> keep their footprint out.
      nfs:
        enabled: false
      nvmeof:
        enabled: false
  postRenderers:
    # Strip the Driver CRs this chart renders. The live Driver CRs
    # (rook-ceph.rbd.csi.ceph.com / rook-ceph.cephfs.csi.ceph.com) are managed
    # by the ceph-csi-operator and carry the user's spec + image-set reference;
    # we keep only the ServiceAccounts and plugin RBAC from this chart.
    - kustomize:
        patches:
          - target:
              group: csi.ceph.io
              version: v1
              kind: Driver
            patch: |
              $patch: delete
              apiVersion: csi.ceph.io/v1
              kind: Driver
              metadata:
                name: ignored
