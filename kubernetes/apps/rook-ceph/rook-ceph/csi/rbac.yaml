---
# CSI plugin ServiceAccounts + RBAC for the Ceph CSI operator (rbd + cephfs).
#
# Rook v1.20 (PR #1170) removed these ServiceAccounts/RBAC from the rook-ceph
# operator chart and moved them to the upstream `ceph-csi-drivers` chart. We do
# NOT install that chart, because it also renders schema-invalid short-named
# `Driver` CRs (the live Drivers rook-ceph.rbd/cephfs.csi.ceph.com are already
# managed by the in-cluster ceph-csi-operator). Instead we vendor ONLY the RBAC.
#
# The in-cluster ceph-csi-operator (CSI_SERVICE_ACCOUNT_PREFIX="") creates the
# CSI controller/node Deployments+DaemonSets that consume these exact SA names
# (rbd-ctrlplugin-sa / cephfs-ctrlplugin-sa / *-nodeplugin-sa). Namespacing is
# applied by the rook-ceph-csi Flux Kustomization (targetNamespace: rook-ceph).
#
# Regenerate:
#   helm repo add ceph-csi-operator https://ceph.github.io/ceph-csi-operator
#   helm template ceph-csi-drivers ceph-csi-operator/ceph-csi-drivers \
#     --version 1.0.1 --namespace rook-ceph \
#     --set operatorConfig.create=false \
#     --set drivers.rbd.name=rbd --set drivers.rbd.enabled=true \
#     --set drivers.cephfs.name=cephfs --set drivers.cephfs.enabled=true \
#     --set drivers.nfs.enabled=false --set drivers.nvmeof.enabled=false \
#   | yq 'select(.kind != "Driver")'
---
