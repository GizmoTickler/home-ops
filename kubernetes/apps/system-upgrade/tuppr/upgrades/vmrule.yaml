---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: tuppr
spec:
  groups:
    - name: tuppr.talosupgrade
      interval: 30s
      rules:
        - alert: TalosUpgradeNodeFailed
          expr: |-
            tuppr_talos_upgrade_nodes_failed > 0
          for: 1m
          keep_firing_for: 5m
          annotations:
            summary: "Talos upgrade {{ $labels.name }} has {{ $value }} failed node(s)"
            description: |-
              Talos upgrade {{ $labels.name }} has {{ $value }} node(s) that
              failed to upgrade. The upgrade has stopped and requires manual
              intervention (fix the underlying issue and reset with the reset
              annotation).
          labels:
            severity: critical
            component: system-upgrade

        - alert: TalosUpgradeFailed
          expr: |-
            tuppr_talos_upgrade_phase{phase="Failed"} > 0
          for: 1m
          keep_firing_for: 5m
          annotations:
            summary: "Talos upgrade {{ $labels.name }} is in Failed phase"
            description: |-
              Talos upgrade {{ $labels.name }} has entered the Failed phase.
              Check controller logs and node conditions for details.
          labels:
            severity: critical
            component: system-upgrade

        - alert: TalosUpgradeStuck
          expr: |-
            tuppr_talos_upgrade_phase{phase=~"Upgrading|Rebooting|Draining|HealthChecking"} > 0
          for: 1h
          keep_firing_for: 5m
          annotations:
            summary: "Talos upgrade {{ $labels.name }} stuck in {{ $labels.phase }} phase"
            description: |-
              Talos upgrade {{ $labels.name }} has been in the
              {{ $labels.phase }} phase for more than 1h.
              Check the upgrade job and target node for errors.
          labels:
            severity: warning
            component: system-upgrade

    - name: tuppr.kubernetesupgrade
      interval: 30s
      rules:
        - alert: KubernetesUpgradeFailed
          expr: |-
            tuppr_kubernetes_upgrade_phase{phase="Failed"} > 0
          for: 1m
          keep_firing_for: 5m
          annotations:
            summary: "Kubernetes upgrade {{ $labels.name }} is in Failed phase"
            description: |-
              Kubernetes upgrade {{ $labels.name }} has entered the Failed phase.
              Check controller logs and the upgrade job for details.
          labels:
            severity: critical
            component: system-upgrade

        - alert: KubernetesUpgradeStuck
          expr: |-
            tuppr_kubernetes_upgrade_phase{phase=~"Upgrading|HealthChecking"} > 0
          for: 45m
          keep_firing_for: 5m
          annotations:
            summary: "Kubernetes upgrade {{ $labels.name }} stuck in {{ $labels.phase }} phase"
            description: |-
              Kubernetes upgrade {{ $labels.name }} has been in the
              {{ $labels.phase }} phase for more than 45 minutes.
              Check the upgrade job and control-plane nodes for errors.
          labels:
            severity: warning
            component: system-upgrade

    - name: tuppr.jobs
      interval: 30s
      rules:
        - alert: UpgradeJobRunningTooLong
          expr: |-
            tuppr_upgrade_jobs_active > 0
          for: 1h
          keep_firing_for: 5m
          annotations:
            summary: "{{ $labels.upgrade_type | title }} upgrade job running for over 1 hour"
            description: |-
              A {{ $labels.upgrade_type }} upgrade job has been active for more
              than 1 hour, which exceeds the expected duration. The job may be
              stuck. Check the job logs in the controller namespace.
          labels:
            severity: warning
            component: system-upgrade
