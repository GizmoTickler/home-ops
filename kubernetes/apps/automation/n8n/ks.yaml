---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: n8n
spec:
  components:
    - ../../../../components/volsync
  interval: 1h
  path: ./kubernetes/apps/automation/n8n/app
  postBuild:
    substitute:
      APP: n8n
      VOLSYNC_CAPACITY: 15Gi
      VOLSYNC_STORAGECLASS: scale-nvmeof
      VOLSYNC_SNAPSHOTCLASS: scale-snapshot
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: automation
  wait: false
