---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/operator.victoriametrics.com/vmauth_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAuth
metadata:
  name: vmauth
spec:
  port: "8427"
  replicas: 1
  # Select all VMUser CRDs in any namespace
  selectAllByDefault: true
  # Unauthorized access config — routes traffic by host and path
  # kgateway handles OIDC authentication; vmauth handles routing
  unauthorizedAccessConfig:
    # VMSingle — metrics UI and API (external access via kgateway)
    - src_hosts:
        - "metrics.${SECRET_DOMAIN}"
      url_prefix:
        - "http://vmsingle-stack.observability.svc.cluster.local:8429"
    # VictoriaLogs — logs UI and API (external access via kgateway)
    - src_hosts:
        - "logs.${SECRET_DOMAIN}"
      url_prefix:
        - "http://victoria-logs-server.observability.svc.cluster.local:9428"
    # Alertmanager UI (external access via kgateway)
    - src_hosts:
        - "alertmanager.${SECRET_DOMAIN}"
      url_prefix:
        - "http://vmalertmanager-stack.observability.svc.cluster.local:9093"
    # Internal Grafana access — path-based routing with prefix stripping
    - src_paths:
        - "/vmsingle/.*"
      url_prefix:
        - "http://vmsingle-stack.observability.svc.cluster.local:8429"
      drop_src_path_prefix_parts: 1
    - src_paths:
        - "/vlogs/.*"
      url_prefix:
        - "http://victoria-logs-server.observability.svc.cluster.local:9428"
      drop_src_path_prefix_parts: 1
    - src_paths:
        - "/vmalertmanager/.*"
      url_prefix:
        - "http://vmalertmanager-stack.observability.svc.cluster.local:9093"
      drop_src_path_prefix_parts: 1
  extraArgs:
    maxConcurrentRequests: "32"
    maxConcurrentPerUserRequests: "16"
    maxIdleConnsPerBackend: "32"
    requestBufferSize: "65536"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
