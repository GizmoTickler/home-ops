---
apiVersion: v1
kind: ConfigMap
metadata:
  name: network-syslog-dashboard
data:
  network-syslog.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Cisco SC01 — All Logs",
          "description": "Cisco 9300 syslog — ACL denies, SSH, STP, interface events (facility=local7)",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "${DS_VICTORIALOGS}" },
          "targets": [
            {
              "expr": "facility:23",
              "refId": "A"
            }
          ],
          "options": { "showTime": true, "showLabels": true, "showCommonLabels": false, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" }
        },
        {
          "title": "VyOS — Firewall Drops",
          "description": "VyOS kernel firewall drop/reject logs from all routers",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 12 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "${DS_VICTORIALOGS}" },
          "targets": [
            {
              "expr": "app_name:kernel _msg:SRC",
              "refId": "A"
            }
          ],
          "options": { "showTime": true, "showLabels": true, "showCommonLabels": false, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" }
        },
        {
          "title": "VyOS — System Logs",
          "description": "VyOS service, routing, DHCP, and auth logs (excluding firewall and blackbox)",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "${DS_VICTORIALOGS}" },
          "targets": [
            {
              "expr": "hostname:gateway0 OR hostname:cell-gateway0 OR hostname:cell-gateway1 NOT app_name:kernel NOT app_name:blackbox_exporter",
              "refId": "A"
            }
          ],
          "options": { "showTime": true, "showLabels": true, "showCommonLabels": false, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" }
        },
        {
          "title": "UniFi — Client Events (CEF)",
          "description": "UniFi Network CEF events — roaming, connect/disconnect, firmware. Expand rows to see cef.* fields",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 36 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "${DS_VICTORIALOGS}" },
          "targets": [
            {
              "expr": "app_name:CEF",
              "refId": "A"
            }
          ],
          "options": { "showTime": true, "showLabels": true, "showCommonLabels": false, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" }
        },
        {
          "title": "UniFi — AP Logs",
          "description": "UniFi AP kernel and system logs (DHCP, roaming, wireless)",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 48 },
          "datasource": { "type": "victoriametrics-logs-datasource", "uid": "${DS_VICTORIALOGS}" },
          "targets": [
            {
              "expr": "hostname:LivingRoomAP OR hostname:LoftAP OR hostname:FlexAP",
              "refId": "A"
            }
          ],
          "options": { "showTime": true, "showLabels": true, "showCommonLabels": false, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" }
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "syslog", "victorialogs"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Network Device Syslog",
      "uid": "network-syslog",
      "version": 2
    }
---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: network-syslog
spec:
  allowCrossNamespaceImport: true
  folder: observability
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: VictoriaLogs
      inputName: DS_VICTORIALOGS
  configMapRef:
    name: network-syslog-dashboard
    key: network-syslog.json
