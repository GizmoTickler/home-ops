---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  timeout: 10m
  upgrade:
    # Do NOT tear down resources on failed upgrade — leave the old workload
    # running / crashlooping so we can diagnose. Prior incident (chart 0.12.0
    # selector change) silently deleted the STS with cleanupOnFail: true.
    cleanupOnFail: false
    remediation:
      retries: 0
  values:
    fullnameOverride: victoria-logs
    server:
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 500Gi
      retentionPeriod: 14d
      serviceMonitor:
        # Disabled — chart 0.12.0 ServiceMonitor selector (`app: server`) no longer
        # matches the Service labels (`app.kubernetes.io/component: server`). The
        # vm-operator auto-converts this broken ServiceMonitor and overwrites the
        # Flux-managed VMServiceScrape at kubernetes/apps/observability/victoria-logs/
        # app/vmservicescrape.yaml, silently dropping VL server scraping. The Flux
        # VMServiceScrape uses the correct `app.kubernetes.io/name` selector.
        enabled: false
      extraArgs:
        search.maxConcurrentRequests: "8"
        search.maxQueueDuration: "30s"
        search.maxQueryDuration: "60s"
        # Native syslog ingestion — replaces vector-syslog
        # Single UDP/TCP listener; K8s service maps external 514/5514/5515 → container 514
        syslog.listenAddr.udp: ":514"
        syslog.listenAddr.tcp: ":514"
        # Stream fields for syslog — auto-extracted from RFC3164/5424 headers
        # Each value must be a JSON array (VictoriaLogs parses as JSON)
        syslog.streamFields.udp: '["hostname","app_name"]'
        syslog.streamFields.tcp: '["hostname","app_name"]'
      resources:
        requests:
          cpu: 175m
          memory: 256Mi
        limits:
          # Increased for complex queries and caching
          memory: 2Gi
    dashboards:
      enabled: true
      labels:
        grafana_dashboard: "1"
