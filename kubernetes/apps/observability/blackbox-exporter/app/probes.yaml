---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: devices
spec:
  module: icmp
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - sc01.${SECRET_DOMAIN}
        - nas01.${SECRET_DOMAIN}
        - nas01-console.${SECRET_DOMAIN}
        - unifi.${SECRET_DOMAIN}
        - jellyfin.${SECRET_DOMAIN}
        - s3.${SECRET_DOMAIN}
        - edge0.${SECRET_DOMAIN}
        - edge1.${SECRET_DOMAIN}
        - dns0.${SECRET_DOMAIN}
        - dns1.${SECRET_DOMAIN}
        - gateway0.${SECRET_DOMAIN}
        - gateway1.${SECRET_DOMAIN}
        - mgateway0.${SECRET_DOMAIN}
        - mgateway1.${SECRET_DOMAIN}
        - cell-gateway0.${SECRET_DOMAIN}
        - cell-gateway1.${SECRET_DOMAIN}

