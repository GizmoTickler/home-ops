---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
  interval: 1h
  upgrade:
    force: true
    cleanupOnFail: false
  values:
    # vlagent DaemonSet — collects logs from all pods on each node
    remoteWrite:
      - url: http://victoria-logs-server.observability.svc.cluster.local:9428
    collector:
      # Include pod labels for app identification in queries
      includePodLabels: true
      includePodAnnotations: false
    # Disk buffer for reliability during VictoriaLogs unavailability
    persistence:
      enabled: true
      storageClassName: openebs-hostpath
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 1Gi
    serviceMonitor:
      enabled: true
