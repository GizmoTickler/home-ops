---
# Daily incremental backup of VMSingle metrics data to TrueNAS NFS
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vmbackup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: vmbackup
              image: victoriametrics/vmbackup:v1.138.0
              args:
                - -snapshotCreateURL=http://vmsingle-stack.observability.svc.cluster.local:8429/snapshot/create
                - -snapshotDeleteURL=http://vmsingle-stack.observability.svc.cluster.local:8429/snapshot/delete
                - -dst=fs:///backups/vmsingle/
                - -origin=http://vmsingle-stack.observability.svc.cluster.local:8429/
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: vmbackup-storage
