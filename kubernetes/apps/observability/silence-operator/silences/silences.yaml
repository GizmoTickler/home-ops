---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/observability.giantswarm.io/silence_v1alpha2.json
# NAS uses ZFS which intentionally uses high memory for ARC cache
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: nas-memory-high-utilization
spec:
  matchers:
    - name: alertname
      value: NodeMemoryHighUtilization
    - name: instance
      value: nas01.${SECRET_DOMAIN}:9100
---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/observability.giantswarm.io/silence_v1alpha2.json
# NAS uses ZFS which intentionally uses high memory for ARC cache
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: nas-kubernetes-node-high-memory
spec:
  matchers:
    - name: alertname
      value: KubernetesNodeHighMemory
    - name: instance
      value: nas01.${SECRET_DOMAIN}:9100
---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/observability.giantswarm.io/silence_v1alpha2.json
# NAS uses ZFS which intentionally uses high memory for ARC cache
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: nas-external-host-high-memory
spec:
  matchers:
    - name: alertname
      value: ExternalHostHighMemory
    - name: instance
      value: nas01.${SECRET_DOMAIN}:9100
---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: keda-hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
    - name: horizontalpodautoscaler
      value: keda-hpa-.*
      matchType: "=~"
---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/observability.giantswarm.io/silence_v1alpha2.json
# Cosmetic false positive: the chart-default vmHealth alert
# `sum(vmalert_recording_rules_last_evaluation_samples) without(id) < 1`
# flaps because each vmalert config-reload re-mints the `id` label and the
# old id-series linger at 0 in VMSingle for the retention window, so
# sum() without(id) transiently reads 0. Taking max() across id, no
# recording rule is actually without data (control plane is fully scraped).
# Severity is info (never pages); silence to keep it off the active board.
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: vmalert-recording-rules-no-data-stale-id-flap
spec:
  matchers:
    - name: alertname
      value: RecordingRulesNoData
