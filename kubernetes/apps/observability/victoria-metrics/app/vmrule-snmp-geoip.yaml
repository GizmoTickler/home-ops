---
# Alerts for the SNMP fabric telemetry + gateway0 GeoIP/threat-feed health.
# Metric source: nflo0 snmp_exporter. The `job` label is the per-target jobName
# (snmp-cisco, snmp-vyos, snmp-geoip) — NOT a flat "snmp" — so every rule selects
# job=~"snmp.*". 2026-06-26: fixed a dead-selector bug where all rules below used
# job=~"snmp.*" (matched zero series) and could never fire; only SNMPTargetDown
# (job=~"snmp.*") worked. Verified live: job=~"snmp.*" -> empty; job=~"snmp.*" -> data.
# 2026-07-04: GeoIP restored on all 3 routers (DBs populated, weekly task-scheduler
# refresh, updater logs to /tmp/geoip-update.log) — the day-one GeoIP alerts cleared.
# Same date: cell-gateways now export the same NET-SNMP-EXTEND metrics as gateway0,
# plus new bgp_default_in_frr/in_config drift metrics and SSH tcp_connect probes.
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: snmp-geoip-alerts
spec:
  groups:
    # ── SNMP target reachability ───────────────────────────────────────────
    - name: snmp-availability.rules
      interval: 60s
      rules:
        - alert: SNMPTargetDown
          expr: |-
            up{job=~"snmp.*"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "SNMP target {{ $labels.instance }} not responding"
            description: |-
              snmp_exporter (nflo0) is getting no SNMP reply from {{ $labels.instance }}.
              If this is SC01 (10.255.255.253), it is the known TrustSec return-path gap
              (cell 18->24 lacks `permit udp src eq snmp`) — see proposal SC01 SNMP fix.
          labels:
            severity: warning
            component: network

    # ── Interface health (IF-MIB) ──────────────────────────────────────────
    - name: snmp-interfaces.rules
      interval: 60s
      rules:
        - alert: InterfaceErrors
          expr: |-
            rate(ifInErrors{job=~"snmp.*"}[5m]) + rate(ifOutErrors{job=~"snmp.*"}[5m]) > 1
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Interface errors on {{ $labels.instance }} {{ $labels.ifName }}"
            description: |-
              {{ $labels.ifAlias }} ({{ $labels.ifName }}) on {{ $labels.instance }}
              is accumulating in/out errors (>1/s over 5m).
          labels:
            severity: warning
            component: network
        - alert: InterfaceDiscards
          expr: |-
            rate(ifInDiscards{job=~"snmp.*"}[5m]) + rate(ifOutDiscards{job=~"snmp.*"}[5m]) > 10
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "Interface discards on {{ $labels.instance }} {{ $labels.ifName }}"
            description: |-
              {{ $labels.ifAlias }} ({{ $labels.ifName }}) on {{ $labels.instance }}
              is discarding packets (>10/s over 5m) — possible congestion or buffer pressure.
          labels:
            severity: warning
            component: network
        # 2026-06-26: per-member egress drops on a server port-channel = LACP hash
        # polarization (one 10G member tail-dropping while siblings stay clean). Scoped to
        # the spreadable server-bundle members Te1/0/10-16 ONLY. Te1/0/9 is DELIBERATELY
        # EXCLUDED: investigation (2026-06-26) showed its drops are the nflo0 ERSPAN GRE feed
        # (Vlan998 10.255.255.37 -> .38) — a single portless IP-pair flow that NO LACP hash
        # can spread, so it permanently pins to Te1/0/9 and tail-drops in the default best-
        # effort queue under microbursts. Those are mirror COPIES (~0.76% of the feed lost,
        # originals forward fine) = zero production impact, so alerting on them is noise.
        # Real storage/VM traffic spreads across Te1/0/10-16, so a drop THERE means actual
        # loss worth investigating. Source-side flow spread is the fix, NOT SC01's global hash.
        - alert: SC01PortChannelMemberPolarized
          expr: |-
            increase(ifOutDiscards{job=~"snmp.*",instance="10.255.255.253",ifName=~"Te1/0/1[0-6]"}[15m]) > 1000
          for: 5m
          keep_firing_for: 15m
          annotations:
            summary: "SC01 port-channel member {{ $labels.ifName }} dropping (LACP polarization?)"
            description: |-
              {{ $labels.ifAlias }} ({{ $labels.ifName }}) on SC01 dropped {{ $value | humanize }}
              egress packets in 15m. If only one member of a Po10/Po20 bundle is dropping while
              its siblings stay clean, the LACP hash is polarizing elephant flows (storage/vMotion)
              onto a single 10G member. Fix by spreading flow-tuples at the source (nas01 bond
              xmit_hash_policy, more NVMe-oF sessions) rather than changing SC01's global hash.
          labels:
            severity: warning
            component: network
        - alert: UplinkDown
          expr: |-
            ifOperStatus{job=~"snmp.*",ifOperStatus="up",ifAlias=~"(?i).*(transit|uplink|po1|po2|portchannel|nas01|pve).*"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Uplink down: {{ $labels.instance }} {{ $labels.ifName }}"
            description: |-
              Transit/uplink {{ $labels.ifAlias }} ({{ $labels.ifName }}) on
              {{ $labels.instance }} is not in operational-up state.
          labels:
            severity: critical
            component: network

    # ── Cisco control plane (CISCO-PROCESS / MEMORY-POOL MIB) ──────────────
    - name: snmp-cisco-health.rules
      interval: 60s
      rules:
        - alert: CiscoHighCPU
          expr: |-
            cpmCPUTotal5minRev{job=~"snmp.*"} > 75
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "High CPU on {{ $labels.instance }}"
            description: "5-min CPU on {{ $labels.instance }} (index {{ $labels.cpmCPUTotalIndex }}) is {{ $value }}%."
          labels:
            severity: warning
            component: network
        - alert: CiscoHighMemory
          expr: |-
            100 * ciscoMemoryPoolUsed{job=~"snmp.*"}
              / (ciscoMemoryPoolUsed{job=~"snmp.*"} + ciscoMemoryPoolFree{job=~"snmp.*"}) > 85
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "High memory on {{ $labels.instance }} ({{ $labels.ciscoMemoryPoolName }})"
            description: "Memory pool {{ $labels.ciscoMemoryPoolName }} on {{ $labels.instance }} is {{ $value | humanize }}% used."
          labels:
            severity: warning
            component: network

    # ── BGP fabric state (BGP4-MIB, Cisco side covers the 3x10G ECMP peers) ─
    - name: snmp-bgp.rules
      interval: 60s
      rules:
        - alert: BGPPeerNotEstablished
          expr: |-
            bgpPeerState{job=~"snmp.*",bgpPeerState="established"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "BGP peer {{ $labels.bgpPeerRemoteAddr }} down on {{ $labels.instance }}"
            description: |-
              BGP session to {{ $labels.bgpPeerRemoteAddr }} (AS {{ $labels.bgpPeerRemoteAs }})
              on {{ $labels.instance }} is not Established. ECMP/backup path may be degraded.
          labels:
            severity: critical
            component: network
        - alert: BGPPeerFlapping
          expr: |-
            increase(bgpPeerFsmEstablishedTransitions{job=~"snmp.*"}[1h]) > 3
          for: 5m
          keep_firing_for: 15m
          annotations:
            summary: "BGP peer {{ $labels.bgpPeerRemoteAddr }} flapping on {{ $labels.instance }}"
            description: "{{ $value }} BGP FSM established-transitions in the last hour to {{ $labels.bgpPeerRemoteAddr }}."
          labels:
            severity: warning
            component: network

    # ── gateway0 GeoIP + threat-feed health (NET-SNMP-EXTEND-MIB) ──────────
    - name: geoip-feed-health.rules
      interval: 60s
      rules:
        - alert: GeoIPBlockEmpty
          expr: |-
            nsExtendOutputFull{job=~"snmp.*",nsExtendCommand=~"geoip_set_elements_wan_(local|transit)"} == 0
          for: 15m
          keep_firing_for: 10m
          annotations:
            summary: "GeoIP country-block set empty ({{ $labels.nsExtendCommand }})"
            description: |-
              gateway0 GeoIP nft set {{ $labels.nsExtendCommand }} has 0 elements — the
              cn/ru/kp/ir/by country-block is providing NO protection. Apply proposal B1
              (configure firewall global-options geoip + run geoip-update.py --init).
          labels:
            severity: warning
            component: security
        - alert: GeoIPUpdaterFailing
          expr: |-
            nsExtendOutputFull{job=~"snmp.*",nsExtendCommand="geoip_update_last_exit"} != 0
          for: 1h
          keep_firing_for: 30m
          annotations:
            summary: "gateway0 GeoIP updater failing"
            description: "geoip-update.py last run returned non-zero — GeoIP DB not refreshing."
          labels:
            severity: warning
            component: security
        - alert: GeoIPDatabaseStale
          expr: |-
            nsExtendOutputFull{job=~"snmp.*",nsExtendCommand="geoip_conf_age_seconds"} > 1209600
          for: 1h
          keep_firing_for: 30m
          annotations:
            summary: "gateway0 GeoIP database stale"
            description: "nftables-geoip.conf is {{ $value | humanizeDuration }} old (>14d) — GeoIP not refreshing."
          labels:
            severity: warning
            component: security
        - alert: ThreatFeedResolverDown
          expr: |-
            nsExtendOutputFull{job=~"snmp.*",nsExtendCommand="vyos_domain_resolver_up"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "vyos-domain-resolver down on {{ $labels.instance }}"
            description: "The service that refreshes the reputation feeds (firehol/spamhaus/et/feodo/bitwire/hagezi) is not active — feeds will go stale."
          labels:
            severity: critical
            component: security
        - alert: ThreatFeedEmpty
          # Feed counts ride in the nsExtendOutLine LABEL ("feed_<name>_elements <N>",
          # gauge value always 1) — match the literal " 0"/" -1" count via regex.
          expr: |-
            nsExtendOutLine{job=~"snmp.*",nsExtendCommand="threat_feeds",nsExtendOutLine=~"feed_.*_elements (0|-1)"} == 1
          for: 2h
          keep_firing_for: 30m
          annotations:
            summary: "Threat feed set empty on {{ $labels.instance }}"
            description: "{{ $labels.nsExtendOutLine }} on {{ $labels.instance }} — a reputation-feed nftables set has been empty for 2h+; the feed URL may be dead or the resolver wedged."
          labels:
            severity: warning
            component: security

    # ── BGP default-origination drift + wan-health daemon (2026-07-04) ──────
    # Drift = FRR originates 0.0.0.0/0 but the saved VyOS config lacks the
    # network statement (the 2026-07 gateway0 incident). config=1/frr=0 during
    # an outage is EXPECTED (wan-health daemon withdrew at runtime) — not drift.
    - name: bgp-origination-drift.rules
      interval: 60s
      rules:
        - alert: BGPDefaultOriginationDrift
          expr: |-
            nsExtendOutputFull{job=~"snmp.*",nsExtendCommand="bgp_default_in_frr"} == 1
              and on(instance)
            nsExtendOutputFull{job=~"snmp.*",nsExtendCommand="bgp_default_in_config"} == 0
          for: 10m
          keep_firing_for: 15m
          annotations:
            summary: "BGP default-route drift on {{ $labels.instance }}"
            description: |-
              {{ $labels.instance }}: FRR is originating 0.0.0.0/0 but the SAVED VyOS
              config has no `network 0.0.0.0/0` statement. A reboot or BGP commit will
              silently withdraw the default (2026-07 gateway0 incident). Fix:
              `set protocols bgp address-family ipv4-unicast network 0.0.0.0/0` + save.
          labels:
            severity: critical
            component: network
        - alert: WANHealthWithdrawn
          expr: |-
            nsExtendOutputFull{job=~"snmp.*",nsExtendCommand="wan_health_state"} == 0
          for: 2m
          keep_firing_for: 10m
          annotations:
            summary: "wan-health daemon withdrew the default on {{ $labels.instance }}"
            description: "{{ $labels.instance }} wan-health-check has withdrawn BGP default origination — its WAN has no working internet path. Traffic is failing over per BGP design."
          labels:
            severity: warning
            component: network

    # ── Management-plane SSH reachability (blackbox tcp_connect, nflo0) ─────
    - name: network-ssh.rules
      interval: 60s
      rules:
        - alert: NetworkDeviceSSHDown
          expr: |-
            probe_success{job="network-ssh-probes"} == 0
          for: 10m
          keep_firing_for: 10m
          annotations:
            summary: "SSH down on {{ $labels.instance }}"
            description: |-
              {{ $labels.instance }} is not answering TCP :22 from nflo0. If the device
              is otherwise up (API/SNMP fine), this is the gw0-style silent SSH breakage
              (2026-07: authorized_keys not regenerated after reboot — fix with the
              delete-save-set-save key toggle via the VyOS API).
          labels:
            severity: warning
            component: network
