---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: network-infra-alerts
spec:
  groups:
    # DNS/DHCP Server Alerts
    - name: dns-dhcp.rules
      interval: 30s
      rules:
        - alert: DNSServerDown
          expr: |-
            probe_success{job="probe/observability/dns"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "DNS server {{ $labels.instance }} is down"
            description: |-
              TCP probe to DNS port 53 on {{ $labels.instance }} has been failing for over 5 minutes.
              DHCP clients may lose DNS resolution if both servers fail.
          labels:
            severity: warning
            component: dns

        - alert: DNSAllServersDown
          expr: |-
            count(probe_success{job="probe/observability/dns"} == 0) == 2
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "All DNS servers are down"
            description: |-
              Both dns0 (192.168.123.250) and dns1 (192.168.123.251) are unreachable on port 53.
              All DNS resolution for the network is offline. Immediate action required.
          labels:
            severity: critical
            component: dns

        - alert: DHCPPrimaryDown
          expr: |-
            probe_success{job="probe/observability/devices",instance=~"dns0.*"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Primary DHCP server (dns0) is down"
            description: |-
              ICMP probe to dns0 has been failing for over 5 minutes.
              Kea HA standby (dns1) should take over DHCP serving.
              Investigate dns0 VM on TrueNAS.
          labels:
            severity: warning
            component: dhcp

        - alert: DHCPAllServersDown
          expr: |-
            count(probe_success{job="probe/observability/devices",instance=~"dns-[01].*"} == 0) == 2
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "All DHCP servers are down"
            description: |-
              Both dns0 and dns1 are unreachable via ICMP.
              No DHCP leases can be issued or renewed. Existing clients retain leases until expiry.
              Immediate action required.
          labels:
            severity: critical
            component: dhcp

        - alert: ReplicationSlotInactive
          expr: |-
            pg_replication_slot_slot_is_active{job="postgres-exporter"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Spock replication slot {{ $labels.slot_name }} inactive on {{ $labels.instance }}"
            description: |-
              Slot {{ $labels.slot_name }} on {{ $labels.instance }} has been inactive for 5m.
              WAL will accumulate until max_slot_wal_keep_size (4GB). Investigate Spock subscription health.
          labels:
            severity: warning
            component: postgres

        - alert: ReplicationLagHigh
          expr: |-
            (pg_replication_slot_slot_current_wal_lsn{job="postgres-exporter"} - pg_replication_slot_slot_confirmed_flush_lsn{job="postgres-exporter"}) > 52428800
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Spock replication lag >50MB for slot {{ $labels.slot_name }}"
            description: |-
              Slot {{ $labels.slot_name }} on {{ $labels.instance }} has >50MB unreplicated WAL for 10m.
              Multi-master sync is lagging; writes on other node not yet applied locally.
          labels:
            severity: warning
            component: postgres

        # NOTE: KeaHAUnsentUpdatesHigh removed 2026-04-17 — kea-exporter (Python
        # patched for Kea 3.0) does not emit kea_ha_unsent_update_count or any
        # kea_*_ha_* metrics. If HA visibility is needed, use the Kea HA status
        # command via control agent and a custom exporter.

        - alert: DNSCacheHitRatioLow
          # 3-layer cache architecture (2026-04-07): dnsdist (200K entries, minTTL=60s)
          # fronts recursor (100K record, 50K packet cache). dnsdist absorbs most repeat
          # queries, so the recursor sees mostly unique/fresh queries — a low RECURSOR
          # packet-cache hit ratio in isolation is EXPECTED and not a regression. We now
          # measure the EFFECTIVE 3-layer hit ratio: a query is a "hit" if it is served
          # from either the dnsdist packet cache OR the recursor packet cache, i.e. did
          # not require a recursor lookup beyond the packet cache.
          #   (dnsdist_hits + recursor_packetcache_hits) / total_queries
          # Total queries are taken from dnsdist_queries (all queries ingress the stack
          # through dnsdist). Threshold: <70% (cluster-wide steady state ~85-90%).
          #
          # 2026-05-02: switched to CLUSTER-WIDE aggregation. The previous per-host
          # formula was load-bearing-broken: each host's dnsdist forwards round-robin
          # to BOTH recursors, so the recursor packetcache_hits on host X include cross-
          # host traffic, while dnsdist_queries on host X only counts local ingress.
          # That mismatch produced numbers that exceeded 100% on the lighter-loaded
          # node and dipped well below 70% on the busier node, generating chronic
          # info-severity false positives. Cluster-wide aggregation is exact under
          # active/active load balancing and is what we actually care about: the user-
          # facing cache effectiveness across the HA pair.
          expr: |-
            (
              sum(rate(dnsdist_cache_hits{job="dnsdist"}[15m]))
              +
              sum(rate(pdns_recursor_packetcache_hits{job="pdns-recursor"}[15m]))
            )
            /
            clamp_min(sum(rate(dnsdist_queries{job="dnsdist"}[15m])), 1)
            < 0.7
          for: 1h
          keep_firing_for: 5m
          annotations:
            summary: "Effective DNS cache hit ratio <70% (cluster-wide)"
            description: |-
              Combined dnsdist + recursor packet cache hit ratio: {{ $value | humanizePercentage }} for 1h.
              Typical healthy value is 85-90%. Likely a warming period after restart, unusual query
              mix, or a cache configuration regression in the 3-layer stack.
          labels:
            severity: info
            component: dns

        # NOTE: DNSZoneSerialDrift removed 2026-04-17 — the PowerDNS Auth
        # built-in Prometheus exporter does not expose per-zone SOA serial
        # (pdns_authoritative_zone_soa_serial does not exist). Zone drift is
        # instead covered indirectly by Spock ReplicationSlotInactive /
        # ReplicationLagHigh on the postgres-exporter. If per-zone visibility
        # is needed, scrape the PowerDNS HTTP API /servers/localhost/zones.

        - alert: KeepalivedVIPFlap
          # dns_keepalived_is_master is a textfile-collector metric on each
          # node-exporter (dns0/dns1:9100). Count state changes across both
          # instances; a healthy stable state has 0 changes in 10m.
          expr: |-
            sum(changes(dns_keepalived_is_master{job="node-exporter",instance=~"dns[01].*"}[10m])) > 4
          for: 0m
          keep_firing_for: 15m
          annotations:
            summary: "Keepalived DNS VIP flapped {{ $value }} times in 10m"
            description: |-
              The DNS VIP (192.168.123.249) changed master/backup state repeatedly across dns0/dns1.
              Health check may be flapping; investigate check-dns-health.sh and network between nodes.
          labels:
            severity: warning
            component: dns

        - alert: KeepalivedNoMaster
          # Either: no master elected (sum == 0) or split-brain (sum > 1)
          expr: |-
            sum(dns_keepalived_is_master{job="node-exporter",instance=~"dns[01].*"}) != 1
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "Keepalived DNS VIP election unhealthy (count={{ $value }})"
            description: |-
              Expected exactly 1 master for the DNS VIP. Current master count: {{ $value }}.
              0 = no master (VIP offline); >1 = split-brain (both nodes claim master).
          labels:
            severity: critical
            component: dns

    # DNS Resolver Health Alerts
    # Added 2026-06-10 after a DNSSEC trust-anchor gap made the recursors return
    # SERVFAIL (EDE 12) for all guest/IoT reverse-PTR lookups, undetected until
    # iPhones froze. These alerts make that class of silent resolver failure
    # page automatically. Metric names verified live against Victoria Metrics:
    #   pdns_recursor_*  (job="pdns-recursor", instance dns[01]:8092)
    #   dnsdist_*        (job="dnsdist",        instance dns[01]:8083)
    #   dnscrypt_proxy_* (job="dnscrypt-proxy", instance dns[01]:49312)
    - name: dns-resolver.rules
      interval: 30s
      rules:
        # --- The headline incident signal: recursor SERVFAIL rate ---
        - alert: RecursorServfailRateHigh
          # pdns_recursor_servfail_answers is the recursor's SERVFAIL counter.
          # Healthy baseline is ~0/s. Today's DNSSEC gap drove this up for every
          # affected lookup. >1/s sustained for 5m is well above noise and would
          # have caught the incident long before users complained.
          expr: |-
            rate(pdns_recursor_servfail_answers{job="pdns-recursor"}[5m]) > 1
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Recursor SERVFAIL rate elevated on {{ $labels.instance }}"
            description: |-
              PowerDNS Recursor on {{ $labels.instance }} is returning {{ $value | humanize }} SERVFAIL/s (5m rate).
              Healthy baseline is ~0/s. Likely cause: DNSSEC trust-anchor gap, upstream resolver
              failure, or broken forwarding. Cross-check RecursorDNSSECBogusIncreasing and
              dnscrypt upstream health. This is the signal class that caused the 2026-06-10
              guest/IoT reverse-PTR outage.
          labels:
            severity: critical
            component: dns

        - alert: DnsdistServfailRateHigh
          # dnsdist front-of-VIP SERVFAIL responses to clients. This catches the
          # user-facing symptom even if the recursor counter is reset/missed, and
          # covers SERVFAILs dnsdist itself synthesizes. Same ~0/s baseline.
          expr: |-
            rate(dnsdist_servfail_responses{job="dnsdist"}[5m]) > 1
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "dnsdist is returning SERVFAIL to clients on {{ $labels.instance }}"
            description: |-
              dnsdist on {{ $labels.instance }} returned {{ $value | humanize }} SERVFAIL/s to clients (5m rate).
              This is what end users actually experience. Likely a recursor backend failure or
              a DNSSEC/upstream problem propagating through the VIP. Check RecursorServfailRateHigh
              and DnsdistBackendDown.
          labels:
            severity: critical
            component: dns

        # --- The exact silent signal from the 2026-06-10 incident ---
        - alert: RecursorDNSSECBogusIncreasing
          # Sum of all pdns_recursor_dnssec_result_bogus* counters. A non-zero
          # sustained rate means validation is FAILING (bogus), which returns
          # SERVFAIL + EDE 12 — exactly the trust-anchor gap that went unnoticed.
          # Baseline is 0/s, so any sustained >0 is actionable.
          expr: |-
            sum by (instance) (
              rate({__name__=~"pdns_recursor_dnssec_result_bogus.*",job="pdns-recursor"}[5m])
            ) > 0.05
          for: 5m
          keep_firing_for: 10m
          annotations:
            summary: "DNSSEC validation failures (bogus) increasing on {{ $labels.instance }}"
            description: |-
              PowerDNS Recursor on {{ $labels.instance }} is recording {{ $value | humanize }} bogus
              DNSSEC validations/s (5m rate). Bogus results return SERVFAIL with EDE 12 to clients.
              Likely cause: a DNSSEC trust-anchor gap, expired/invalid RRSIGs upstream, or a
              missing/stale root key. This is the precise silent signal behind the 2026-06-10
              guest/IoT reverse-PTR outage. Check the recursor root trust anchor and
              rec_control current-queries / dump-trace.
          labels:
            severity: critical
            component: dns

        # --- Recursor upstream latency / outgoing trouble ---
        - alert: RecursorClientLatencyHigh
          # True recent average client-answer latency = rate(sum)/rate(count) on
          # the cumul_clientanswers_seconds histogram, in SECONDS. Healthy floor
          # is ~16-28ms (upstream DoH). The raw pdns_recursor_qa_latency gauge is
          # a lifetime average dominated by cache hits (~1ms) and is NOT used here.
          # >150ms sustained 10m indicates real upstream trouble.
          expr: |-
            (
              rate(pdns_recursor_cumul_clientanswers_seconds_sum{job="pdns-recursor"}[10m])
              /
              clamp_min(rate(pdns_recursor_cumul_clientanswers_seconds_count{job="pdns-recursor"}[10m]), 1)
            ) > 0.15
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Recursor client-answer latency high on {{ $labels.instance }}"
            description: |-
              Average client-answer latency on {{ $labels.instance }} is {{ $value | humanize }}s over 10m
              (healthy floor ~16-28ms). Upstream DoH may be slow or failing, or the recursor is
              spending time on retries/timeouts. Check RecursorOutgoingTimeoutsHigh and dnscrypt
              upstream response time.
          labels:
            severity: warning
            component: dns

        - alert: RecursorOutgoingTimeoutsHigh
          # pdns_recursor_outgoing_timeouts: upstream/auth queries that timed out.
          # Baseline ~0/s. Rising timeouts often precede SERVFAILs and high latency.
          expr: |-
            rate(pdns_recursor_outgoing_timeouts{job="pdns-recursor"}[5m]) > 1
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Recursor outgoing query timeouts rising on {{ $labels.instance }}"
            description: |-
              PowerDNS Recursor on {{ $labels.instance }} is timing out on {{ $value | humanize }} outgoing
              queries/s (5m rate). Upstream resolvers (DoH via dnscrypt-proxy or authoritatives)
              may be unreachable or slow. Often a precursor to SERVFAILs and elevated latency.
          labels:
            severity: warning
            component: dns

        # --- dnsdist -> recursor backend path health ---
        - alert: DnsdistBackendDown
          # dnsdist_server_status == 0 means dnsdist marked a recursor backend
          # DOWN. The `server` label is local-recursor / remote-recursor-dnsN.
          # If a node's local recursor dies, dnsdist fails over to the remote,
          # but the DOWN backend still needs attention.
          expr: |-
            dnsdist_server_status{job="dnsdist"} == 0
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "dnsdist backend {{ $labels.server }} is DOWN on {{ $labels.instance }}"
            description: |-
              dnsdist on {{ $labels.instance }} has marked recursor backend "{{ $labels.server }}"
              ({{ $labels.address }}) as DOWN. The dnsdist->recursor path for that backend is failing
              its health check. Resolution continues via the surviving backend, but redundancy is lost.
              Investigate the recursor process / port 5301 on the affected node.
          labels:
            severity: warning
            component: dns

        - alert: DnsdistAllBackendsDown
          # All dnsdist backends on a node down at once = that node's dnsdist can
          # serve nothing from the recursor tier. Critical.
          expr: |-
            sum by (instance) (dnsdist_server_status{job="dnsdist"}) == 0
          for: 1m
          keep_firing_for: 5m
          annotations:
            summary: "All dnsdist recursor backends DOWN on {{ $labels.instance }}"
            description: |-
              Every recursor backend behind dnsdist on {{ $labels.instance }} is DOWN. This node's
              dnsdist cannot resolve anything via the recursor tier. If this is the VIP master, all
              clients are affected. Immediate action required.
          labels:
            severity: critical
            component: dns

        # --- Scrape-target liveness: a dead exporter/service caught directly ---
        - alert: DNSResolverTargetDown
          # up==0 for any DNS-stack scrape target (dnsdist/recursor/auth/dnscrypt)
          # means either the exporter or the service itself is dead — a silent
          # failure mode that probe-on-port-53 alone may miss.
          expr: |-
            up{job=~"dnsdist|pdns-recursor|pdns-auth|dnscrypt-proxy"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "DNS scrape target {{ $labels.job }} down on {{ $labels.instance }}"
            description: |-
              Prometheus scrape of {{ $labels.job }} on {{ $labels.instance }} has been failing (up==0)
              for 5m. The exporter or the underlying DNS service ({{ $labels.job }}) may be dead.
              If both nodes show the same job down, resolution for that component is fully offline.
          labels:
            severity: warning
            component: dns

        - alert: DNSResolverComponentAllDown
          # Same component down on BOTH nodes = no redundancy left for that tier.
          expr: |-
            count by (job) (up{job=~"dnsdist|pdns-recursor|pdns-auth|dnscrypt-proxy"} == 0) >= 2
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "DNS component {{ $labels.job }} is down on ALL nodes"
            description: |-
              {{ $labels.job }} is down (up==0) on both dns0 and dns1. That entire tier of the
              resolver stack is offline cluster-wide. Immediate action required.
          labels:
            severity: critical
            component: dns

        # --- dnscrypt-proxy upstream (DoH) health ---
        - alert: DnscryptUpstreamLatencyHigh
          # dnscrypt_proxy_server_response_time_average_ms is the per-upstream
          # (server="cf-gateway") DoH response time. Healthy ~33-38ms. There is NO
          # explicit upstream-error counter in dnscrypt-proxy 2.1.15, so sustained
          # high response time is the best available proxy for upstream trouble.
          expr: |-
            dnscrypt_proxy_server_response_time_average_ms{job="dnscrypt-proxy"} > 250
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "dnscrypt-proxy upstream {{ $labels.server }} slow on {{ $labels.instance }}"
            description: |-
              dnscrypt-proxy on {{ $labels.instance }} reports {{ $value | humanize }}ms average response
              time from upstream "{{ $labels.server }}" (healthy ~33-38ms). The upstream DoH resolver
              may be degraded; this feeds recursor latency and can cascade into outgoing timeouts and
              SERVFAILs. NOTE: dnscrypt-proxy 2.1.15 has no upstream-error counter, so latency is the
              only observable upstream-health signal (see report for the exporter gap).
          labels:
            severity: warning
            component: dns

    # WAN / Gateway Alerts
    - name: wan-gateway.rules
      interval: 30s
      rules:
        - alert: GatewayNodeDown
          expr: |-
            up{job="node-exporter",instance=~"10.255.255.254.*"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Primary gateway (gateway0) node exporter is unreachable"
            description: |-
              Node exporter on gateway0 (10.255.255.254:9100) has been unreachable for over 5 minutes.
              Gateway0 may be down. Traffic should fail over to gateway1 via BGP.
          labels:
            severity: critical
            component: gateway

        - alert: GatewayWANInterfaceDown
          expr: |-
            node_network_carrier{instance=~"10.255.255.254.*",device="eth0"} == 0
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "Primary WAN interface (eth0) on gateway0 is down"
            description: |-
              The Frontier fiber WAN interface on gateway0 has lost carrier for over 2 minutes.
              BGP should withdraw the default route and traffic will fail over to cellular (gateway1).
          labels:
            severity: critical
            component: gateway

        - alert: PrimaryWANDown
          expr: |-
            count(probe_success{job=~"gateway-wan.*"} == 0) >= 5
          for: 3m
          keep_firing_for: 5m
          annotations:
            summary: "Primary WAN (Frontier fiber) has lost internet reachability"
            description: |-
              {{ $value }} of 7 multi-protocol probes (ICMP/HTTP/TCP) from gateway0 are failing.
              Frontier fiber link may be up but ISP routing is broken.
              Traffic should fail over to cellular (gateway1) via BGP.
          labels:
            severity: critical
            component: gateway

        - alert: PrimaryWANDegraded
          expr: |-
            count(probe_success{job=~"gateway-wan.*"} == 0) >= 2
            and
            count(probe_success{job=~"gateway-wan.*"} == 0) < 5
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Primary WAN has partial reachability loss"
            description: |-
              {{ $value }} of 7 multi-protocol probes from gateway0 are failing.
              Frontier fiber may have partial routing issues.
          labels:
            severity: warning
            component: gateway

        - alert: BackupGatewayDown
          expr: |-
            probe_success{job="probe/observability/devices",instance=~"gateway1.*"} == 0
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Backup gateway (gateway1) is unreachable"
            description: |-
              ICMP probe to gateway1 (ISR 4321) has been failing for over 10 minutes.
              Cellular WAN backup is unavailable. Primary fiber (gateway0) is the only internet path.
          labels:
            severity: warning
            component: gateway

        - alert: CellularWANDown
          expr: |-
            (count(probe_success{job=~"cgw0-wan.*"} == 0) >= 5)
            and
            (count(probe_success{job=~"cgw1-wan.*"} == 0) >= 5)
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Both cellular WANs have lost internet reachability"
            description: |-
              Multi-protocol probes (ICMP/HTTP/TCP) from both cell-gateway0 and cell-gateway1 are failing.
              Cellular backup internet is completely unavailable.
          labels:
            severity: warning
            component: gateway

        - alert: CellularWAN1Down
          expr: |-
            count(probe_success{job=~"cgw0-wan.*"} == 0) >= 5
          for: 90s
          keep_firing_for: 5m
          annotations:
            summary: "Cellular WAN 1 (cell-gateway0) has lost internet reachability"
            description: |-
              {{ $value }} of 7 multi-protocol probes from cell-gateway0 (T-Mobile modem #1) are failing.
              Cell-gateway1 may still be providing backup connectivity.
          labels:
            severity: warning
            component: gateway

        - alert: CellularWAN2Down
          expr: |-
            count(probe_success{job=~"cgw1-wan.*"} == 0) >= 5
          for: 90s
          keep_firing_for: 5m
          annotations:
            summary: "Cellular WAN 2 (cell-gateway1) has lost internet reachability"
            description: |-
              {{ $value }} of 7 multi-protocol probes from cell-gateway1 (T-Mobile modem #2) are failing.
              Cell-gateway0 may still be providing backup connectivity.
          labels:
            severity: warning
            component: gateway
