---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: network-infra-alerts
spec:
  groups:
    # DNS/DHCP Server Alerts
    - name: dns-dhcp.rules
      interval: 30s
      rules:
        - alert: DNSServerDown
          expr: |-
            probe_success{job="probe/observability/dns"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "DNS server {{ $labels.instance }} is down"
            description: |-
              TCP probe to DNS port 53 on {{ $labels.instance }} has been failing for over 5 minutes.
              DHCP clients may lose DNS resolution if both servers fail.
          labels:
            severity: warning
            component: dns

        - alert: DNSAllServersDown
          expr: |-
            count(probe_success{job="probe/observability/dns"} == 0) == 2
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "All DNS servers are down"
            description: |-
              Both dns0 (192.168.123.250) and dns1 (192.168.123.251) are unreachable on port 53.
              All DNS resolution for the network is offline. Immediate action required.
          labels:
            severity: critical
            component: dns

        - alert: DHCPPrimaryDown
          expr: |-
            probe_success{job="probe/observability/devices",instance=~"dns0.*"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Primary DHCP server (dns0) is down"
            description: |-
              ICMP probe to dns0 has been failing for over 5 minutes.
              Kea HA standby (dns1) should take over DHCP serving.
              Investigate dns0 VM on TrueNAS.
          labels:
            severity: warning
            component: dhcp

        - alert: DHCPAllServersDown
          expr: |-
            count(probe_success{job="probe/observability/devices",instance=~"dns-[01].*"} == 0) == 2
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "All DHCP servers are down"
            description: |-
              Both dns0 and dns1 are unreachable via ICMP.
              No DHCP leases can be issued or renewed. Existing clients retain leases until expiry.
              Immediate action required.
          labels:
            severity: critical
            component: dhcp

        - alert: ReplicationSlotInactive
          expr: |-
            pg_replication_slot_slot_is_active{job="postgres-exporter"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Spock replication slot {{ $labels.slot_name }} inactive on {{ $labels.instance }}"
            description: |-
              Slot {{ $labels.slot_name }} on {{ $labels.instance }} has been inactive for 5m.
              WAL will accumulate until max_slot_wal_keep_size (4GB). Investigate Spock subscription health.
          labels:
            severity: warning
            component: postgres

        - alert: ReplicationLagHigh
          expr: |-
            (pg_replication_slot_slot_current_wal_lsn{job="postgres-exporter"} - pg_replication_slot_slot_confirmed_flush_lsn{job="postgres-exporter"}) > 52428800
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Spock replication lag >50MB for slot {{ $labels.slot_name }}"
            description: |-
              Slot {{ $labels.slot_name }} on {{ $labels.instance }} has >50MB unreplicated WAL for 10m.
              Multi-master sync is lagging; writes on other node not yet applied locally.
          labels:
            severity: warning
            component: postgres

        # NOTE: KeaHAUnsentUpdatesHigh removed 2026-04-17 — kea-exporter (Python
        # patched for Kea 3.0) does not emit kea_ha_unsent_update_count or any
        # kea_*_ha_* metrics. If HA visibility is needed, use the Kea HA status
        # command via control agent and a custom exporter.

        - alert: DNSCacheHitRatioLow
          # 3-layer cache architecture (2026-04-07): dnsdist (200K entries, minTTL=60s)
          # fronts recursor (100K record, 50K packet cache). dnsdist absorbs most repeat
          # queries, so the recursor sees mostly unique/fresh queries — a low RECURSOR
          # packet-cache hit ratio in isolation is EXPECTED and not a regression. We now
          # measure the EFFECTIVE 3-layer hit ratio: a query is a "hit" if it is served
          # from either the dnsdist packet cache OR the recursor packet cache, i.e. did
          # not require a recursor lookup beyond the packet cache.
          #   (dnsdist_hits + recursor_packetcache_hits) / total_queries
          # Total queries are taken from dnsdist_queries (all queries ingress the stack
          # through dnsdist). Threshold: <70% (cluster-wide steady state ~85-90%).
          #
          # 2026-05-02: switched to CLUSTER-WIDE aggregation. The previous per-host
          # formula was load-bearing-broken: each host's dnsdist forwards round-robin
          # to BOTH recursors, so the recursor packetcache_hits on host X include cross-
          # host traffic, while dnsdist_queries on host X only counts local ingress.
          # That mismatch produced numbers that exceeded 100% on the lighter-loaded
          # node and dipped well below 70% on the busier node, generating chronic
          # info-severity false positives. Cluster-wide aggregation is exact under
          # active/active load balancing and is what we actually care about: the user-
          # facing cache effectiveness across the HA pair.
          expr: |-
            (
              sum(rate(dnsdist_cache_hits{job="dnsdist"}[15m]))
              +
              sum(rate(pdns_recursor_packetcache_hits{job="pdns-recursor"}[15m]))
            )
            /
            clamp_min(sum(rate(dnsdist_queries{job="dnsdist"}[15m])), 1)
            < 0.7
          for: 1h
          keep_firing_for: 5m
          annotations:
            summary: "Effective DNS cache hit ratio <70% (cluster-wide)"
            description: |-
              Combined dnsdist + recursor packet cache hit ratio: {{ $value | humanizePercentage }} for 1h.
              Typical healthy value is 85-90%. Likely a warming period after restart, unusual query
              mix, or a cache configuration regression in the 3-layer stack.
          labels:
            severity: info
            component: dns

        # NOTE: DNSZoneSerialDrift removed 2026-04-17 — the PowerDNS Auth
        # built-in Prometheus exporter does not expose per-zone SOA serial
        # (pdns_authoritative_zone_soa_serial does not exist). Zone drift is
        # instead covered indirectly by Spock ReplicationSlotInactive /
        # ReplicationLagHigh on the postgres-exporter. If per-zone visibility
        # is needed, scrape the PowerDNS HTTP API /servers/localhost/zones.

        - alert: KeepalivedVIPFlap
          # dns_keepalived_is_master is a textfile-collector metric on each
          # node-exporter (dns0/dns1:9100). Count state changes across both
          # instances; a healthy stable state has 0 changes in 10m.
          expr: |-
            sum(changes(dns_keepalived_is_master{job="node-exporter",instance=~"dns[01].*"}[10m])) > 4
          for: 0m
          keep_firing_for: 15m
          annotations:
            summary: "Keepalived DNS VIP flapped {{ $value }} times in 10m"
            description: |-
              The DNS VIP (192.168.123.249) changed master/backup state repeatedly across dns0/dns1.
              Health check may be flapping; investigate check-dns-health.sh and network between nodes.
          labels:
            severity: warning
            component: dns

        - alert: KeepalivedNoMaster
          # Either: no master elected (sum == 0) or split-brain (sum > 1)
          expr: |-
            sum(dns_keepalived_is_master{job="node-exporter",instance=~"dns[01].*"}) != 1
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "Keepalived DNS VIP election unhealthy (count={{ $value }})"
            description: |-
              Expected exactly 1 master for the DNS VIP. Current master count: {{ $value }}.
              0 = no master (VIP offline); >1 = split-brain (both nodes claim master).
          labels:
            severity: critical
            component: dns

    # WAN / Gateway Alerts
    - name: wan-gateway.rules
      interval: 30s
      rules:
        - alert: GatewayNodeDown
          expr: |-
            up{job="node-exporter",instance=~"10.255.255.254.*"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Primary gateway (gateway0) node exporter is unreachable"
            description: |-
              Node exporter on gateway0 (10.255.255.254:9100) has been unreachable for over 5 minutes.
              Gateway0 may be down. Traffic should fail over to gateway1 via BGP.
          labels:
            severity: critical
            component: gateway

        - alert: GatewayWANInterfaceDown
          expr: |-
            node_network_carrier{instance=~"10.255.255.254.*",device="eth0"} == 0
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "Primary WAN interface (eth0) on gateway0 is down"
            description: |-
              The Frontier fiber WAN interface on gateway0 has lost carrier for over 2 minutes.
              BGP should withdraw the default route and traffic will fail over to cellular (gateway1).
          labels:
            severity: critical
            component: gateway

        - alert: PrimaryWANDown
          expr: |-
            count(probe_success{job=~"gateway-wan.*"} == 0) >= 5
          for: 3m
          keep_firing_for: 5m
          annotations:
            summary: "Primary WAN (Frontier fiber) has lost internet reachability"
            description: |-
              {{ $value }} of 7 multi-protocol probes (ICMP/HTTP/TCP) from gateway0 are failing.
              Frontier fiber link may be up but ISP routing is broken.
              Traffic should fail over to cellular (gateway1) via BGP.
          labels:
            severity: critical
            component: gateway

        - alert: PrimaryWANDegraded
          expr: |-
            count(probe_success{job=~"gateway-wan.*"} == 0) >= 2
            and
            count(probe_success{job=~"gateway-wan.*"} == 0) < 5
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Primary WAN has partial reachability loss"
            description: |-
              {{ $value }} of 7 multi-protocol probes from gateway0 are failing.
              Frontier fiber may have partial routing issues.
          labels:
            severity: warning
            component: gateway

        - alert: BackupGatewayDown
          expr: |-
            probe_success{job="probe/observability/devices",instance=~"gateway1.*"} == 0
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Backup gateway (gateway1) is unreachable"
            description: |-
              ICMP probe to gateway1 (ISR 4321) has been failing for over 10 minutes.
              Cellular WAN backup is unavailable. Primary fiber (gateway0) is the only internet path.
          labels:
            severity: warning
            component: gateway

        - alert: CellularWANDown
          expr: |-
            (count(probe_success{job=~"cgw0-wan.*"} == 0) >= 5)
            and
            (count(probe_success{job=~"cgw1-wan.*"} == 0) >= 5)
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Both cellular WANs have lost internet reachability"
            description: |-
              Multi-protocol probes (ICMP/HTTP/TCP) from both cell-gateway0 and cell-gateway1 are failing.
              Cellular backup internet is completely unavailable.
          labels:
            severity: warning
            component: gateway

        - alert: CellularWAN1Down
          expr: |-
            count(probe_success{job=~"cgw0-wan.*"} == 0) >= 5
          for: 90s
          keep_firing_for: 5m
          annotations:
            summary: "Cellular WAN 1 (cell-gateway0) has lost internet reachability"
            description: |-
              {{ $value }} of 7 multi-protocol probes from cell-gateway0 (T-Mobile modem #1) are failing.
              Cell-gateway1 may still be providing backup connectivity.
          labels:
            severity: warning
            component: gateway

        - alert: CellularWAN2Down
          expr: |-
            count(probe_success{job=~"cgw1-wan.*"} == 0) >= 5
          for: 90s
          keep_firing_for: 5m
          annotations:
            summary: "Cellular WAN 2 (cell-gateway1) has lost internet reachability"
            description: |-
              {{ $value }} of 7 multi-protocol probes from cell-gateway1 (T-Mobile modem #2) are failing.
              Cell-gateway0 may still be providing backup connectivity.
          labels:
            severity: warning
            component: gateway
