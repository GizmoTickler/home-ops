---
# yaml-language-server: $schema=https://kubernetes-schema.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: infrastructure-alerts
spec:
  groups:
    # Kubernetes Node Alerts
    - name: kubernetes-nodes.rules
      interval: 30s
      rules:
        - alert: KubernetesNodeNotReady
          expr: |-
            kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "Kubernetes node {{ $labels.node }} is NotReady"
            description: |-
              Node {{ $labels.node }} has been in NotReady state for more than 2 minutes.
              This will trigger pod evictions and may cause service disruptions.
              Check kubelet logs and node resources immediately.
            runbook_url: https://kubernetes.io/docs/concepts/architecture/nodes/#condition
          labels:
            severity: critical
            component: kubernetes

        - alert: KubernetesNodeMemoryPressure
          expr: |-
            kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Node {{ $labels.node }} is under memory pressure"
            description: |-
              Node {{ $labels.node }} is experiencing memory pressure.
              Pods may be evicted to free up memory.
            runbook_url: https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesNodeDiskPressure
          expr: |-
            kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Node {{ $labels.node }} is under disk pressure"
            description: |-
              Node {{ $labels.node }} is experiencing disk pressure.
              Pods may be evicted and new pods cannot be scheduled.
            runbook_url: https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesNodePIDPressure
          expr: |-
            kube_node_status_condition{condition="PIDPressure",status="true"} == 1
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Node {{ $labels.node }} is under PID pressure"
            description: |-
              Node {{ $labels.node }} is running out of PIDs.
              No new processes can be created.
            runbook_url: https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesNodeNetworkUnavailable
          expr: |-
            kube_node_status_condition{condition="NetworkUnavailable",status="true"} == 1
          for: 2m
          keep_firing_for: 5m
          annotations:
            summary: "Node {{ $labels.node }} network is unavailable"
            description: |-
              Node {{ $labels.node }} network is unavailable.
              Check CNI (Cilium) configuration and network connectivity.
            runbook_url: https://docs.cilium.io/en/stable/operations/troubleshooting/
          labels:
            severity: critical
            component: kubernetes

        - alert: KubernetesNodeHighCPU
          expr: |-
            (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)) * 100 > 90
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "Node {{ $labels.instance }} CPU usage is high"
            description: |-
              Node {{ $labels.instance }} CPU usage is {{ $value | humanize }}% for over 15 minutes.
              Consider rebalancing workloads or scaling the cluster.
            runbook_url: https://kubernetes.io/docs/concepts/cluster-administration/manage-deployment/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesNodeHighMemory
          expr: |-
            (1 - (node_memory_MemAvailable_bytes{instance!~"nas01.*"} / node_memory_MemTotal_bytes{instance!~"nas01.*"})) * 100 > 90
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "Node {{ $labels.instance }} memory usage is high"
            description: |-
              Node {{ $labels.instance }} memory usage is {{ $value | humanize }}% for over 15 minutes.
              Risk of OOM kills and pod evictions.
            runbook_url: https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesNodeFilesystemAlmostFull
          expr: |-
            (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "Node {{ $labels.instance }} filesystem is almost full"
            description: |-
              Node {{ $labels.instance }} root filesystem is {{ $value | humanize }}% full.
              Consider cleaning up unused images or logs.
            runbook_url: https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/
          labels:
            severity: warning
            component: kubernetes

    # Pod Eviction Alerts
    - name: kubernetes-pod-evictions.rules
      interval: 30s
      rules:
        - alert: KubernetesPodEvictions
          expr: |-
            increase(kube_pod_status_reason{reason="Evicted"}[10m]) > 0
          keep_firing_for: 5m
          annotations:
            summary: "Pods are being evicted in namespace {{ $labels.namespace }}"
            description: |-
              {{ $value }} pod(s) have been evicted in namespace {{ $labels.namespace }} in the last 10 minutes.
              Pod: {{ $labels.pod }}
              Check node resources and pod resource requests/limits.
            runbook_url: https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesPodOOMKilled
          # Exclude the transient image-pull DaemonSet pods (image-pull.yaml workflow):
          # they fail to start by design, so their churn is not a real fault.
          expr: |-
            increase(kube_pod_container_status_last_terminated_reason{reason="OOMKilled", pod!~"image-pull-.+"}[10m]) > 0
          keep_firing_for: 5m
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOM killed"
            description: |-
              Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} was killed due to out-of-memory.
              Consider increasing memory limits or investigating memory leaks.
            runbook_url: https://kubernetes.io/docs/tasks/configure-pod-container/assign-memory-resource/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesPodCrashLooping
          # Exclude the transient image-pull DaemonSet pods (image-pull.yaml workflow):
          # DaemonSet restartPolicy is always Always, so their fast-fail prepull container
          # restarts by design until the workflow tears the DaemonSet down.
          expr: |-
            rate(kube_pod_container_status_restarts_total{pod!~"image-pull-.+"}[15m]) > 0.1
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: |-
              Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting frequently ({{ $value | humanize }} restarts/sec).
              Check pod logs for errors.
            runbook_url: https://kubernetes.io/docs/tasks/debug/debug-application/debug-running-pod/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesPodNotReady
          expr: |-
            kube_pod_status_ready{condition="false"} == 1
            and
            kube_pod_status_phase{phase=~"Running"} == 1
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
            description: |-
              Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in Running but Not Ready state for over 10 minutes.
              Check readiness probe and pod health.
            runbook_url: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesPodPending
          expr: |-
            kube_pod_status_phase{phase="Pending"} == 1
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is stuck in Pending"
            description: |-
              Pod {{ $labels.namespace }}/{{ $labels.pod }} has been pending for over 15 minutes.
              Check resource availability, node affinity, and PVC binding.
            runbook_url: https://kubernetes.io/docs/concepts/scheduling-eviction/pod-scheduling-readiness/
          labels:
            severity: warning
            component: kubernetes

    # Control Plane Alerts
    - name: kubernetes-control-plane.rules
      interval: 30s
      rules:
        - alert: KubernetesAPIServerDown
          expr: |-
            absent(up{job="apiserver"}) or up{job="apiserver"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Kubernetes API server is down"
            description: |-
              Kubernetes API server has been unavailable for more than 5 minutes.
              The cluster control plane is not functioning.
            runbook_url: https://kubernetes.io/docs/reference/command-line-tools-reference/kube-apiserver/
          labels:
            severity: critical
            component: kubernetes

        - alert: KubernetesAPIServerHighLatency
          # Exclude long-lived streaming subresources (log/exec/attach/portforward/proxy):
          # their request duration is the client stream lifetime, not server latency, so
          # they spuriously trip the p99 threshold (e.g. a 30s `kubectl logs -f`).
          expr: |-
            histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{verb!="WATCH", subresource!~"log|exec|attach|portforward|proxy"}[5m])) by (le, verb)) > 1
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Kubernetes API server has high request latency"
            description: |-
              API server p99 request latency for {{ $labels.verb }} requests is {{ $value | humanizeDuration }}.
              This may indicate performance issues or high cluster load.
            runbook_url: https://kubernetes.io/docs/concepts/cluster-administration/system-metrics/
          labels:
            severity: warning
            component: kubernetes

        - alert: KubernetesAPIServerErrors
          expr: |-
            sum(rate(apiserver_request_total{code=~"5.."}[5m])) by (verb, code) / sum(rate(apiserver_request_total[5m])) by (verb) > 0.05
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Kubernetes API server has high error rate"
            description: |-
              API server is returning {{ $value | humanizePercentage }} 5xx errors for {{ $labels.verb }} requests.
              Check API server logs for issues.
            runbook_url: https://kubernetes.io/docs/concepts/cluster-administration/system-metrics/
          labels:
            severity: warning
            component: kubernetes

        # kubeadm runs kube-controller-manager and kube-scheduler as static pods
        # that can expose metrics (e.g. :10257/:10259). We keep this pod-status
        # alert as a provider-agnostic baseline; add metrics-based rules if/when
        # those endpoints are scraped.
        - alert: KubernetesControlPlanePodsDown
          expr: |-
            kube_pod_status_phase{namespace="kube-system",pod=~"kube-(controller-manager|scheduler).*",phase!="Running"} == 1
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Control plane pod {{ $labels.pod }} is not running"
            description: |-
              Control plane pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is in {{ $labels.phase }} phase.
              This may indicate control plane issues.
            runbook_url: https://kubernetes.io/docs/concepts/architecture/control-plane-node-communication/
          labels:
            severity: critical
            component: kubernetes

      # kubeadm runs etcd as a static pod that can expose metrics on :2381.
      # We currently monitor etcd health indirectly via API server and node
      # status (if the API server is up and nodes are Ready, etcd is
      # functioning); add etcd metrics rules if that endpoint is scraped.

    # Storage Alerts
    - name: kubernetes-storage.rules
      interval: 30s
      rules:
        - alert: KubernetesPVCPending
          expr: |-
            kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is pending"
            description: |-
              PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} has been pending for over 15 minutes.
              Check storage class availability and volume provisioner.
            runbook_url: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
          labels:
            severity: warning
            component: storage

        - alert: KubernetesPVCNearlyFull
          expr: |-
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is nearly full"
            description: |-
              PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | humanizePercentage }} full.
              Consider expanding the volume or cleaning up data.
            runbook_url: https://kubernetes.io/docs/concepts/storage/persistent-volumes/#expanding-persistent-volumes-claims
          labels:
            severity: warning
            component: storage

    # Network Alerts
    - name: kubernetes-network.rules
      interval: 30s
      rules:
        - alert: CiliumAgentDown
          expr: |-
            absent(up{job="cilium-agent"}) or up{job="cilium-agent"} == 0
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "Cilium agent is down"
            description: |-
              Cilium agent has been unavailable for more than 5 minutes.
              Pod networking may be affected.
            runbook_url: https://docs.cilium.io/en/stable/operations/troubleshooting/
          labels:
            severity: critical
            component: network

        - alert: CiliumEndpointNotReady
          expr: |-
            sum(cilium_endpoint_state{endpoint_state!="ready"}) by (endpoint_state) > 0
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "Cilium has endpoints in {{ $labels.endpoint_state }} state"
            description: |-
              {{ $value }} Cilium endpoints are in {{ $labels.endpoint_state }} state.
              This may affect pod networking.
            runbook_url: https://docs.cilium.io/en/stable/operations/troubleshooting/
          labels:
            severity: warning
            component: network

    # External Host Alerts (non-K8s VMs scraped via VMStaticScrape)
    - name: external-hosts.rules
      interval: 30s
      rules:
        - alert: ExternalHostDown
          expr: |-
            up{job="node-exporter", instance!~".*k8s.*"} == 0
          for: 3m
          keep_firing_for: 5m
          annotations:
            summary: "Host {{ $labels.instance }} is down"
            description: |-
              node_exporter on {{ $labels.instance }} has been unreachable for 3 minutes.
              Check host connectivity and service status.
          labels:
            severity: critical
            component: infrastructure

        - alert: ExternalHostHighCPU
          expr: |-
            (1 - avg without(cpu, mode) (rate(node_cpu_seconds_total{mode="idle", job="node-exporter"}[5m]))) * 100 > 90
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "Host {{ $labels.instance }} CPU usage is {{ $value | humanize }}%"
            description: |-
              CPU on {{ $labels.instance }} has been above 90% for 15 minutes.
          labels:
            severity: warning
            component: infrastructure

        # 2026-07-21: made ZFS-ARC-aware. nas01's ARC (~75 GiB, c_max ≈ all RAM) is
        # reclaimable-on-demand cache the kernel does NOT count in MemAvailable, so the
        # naive expr reads a permanently-healthy TrueNAS box as >90% used and would fire
        # forever. Adding node_zfs_arc_size back to "available" (or 0 on non-ZFS hosts)
        # measures real memory pressure on every host.
        - alert: ExternalHostHighMemory
          expr: |-
            (1 - ((node_memory_MemAvailable_bytes{job="node-exporter"}
              + (node_zfs_arc_size{job="node-exporter"} or 0 * node_memory_MemAvailable_bytes{job="node-exporter"}))
              / node_memory_MemTotal_bytes{job="node-exporter"})) * 100 > 90
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "Host {{ $labels.instance }} memory usage is {{ $value | humanize }}% (ARC-adjusted)"
            description: |-
              Memory on {{ $labels.instance }} has been above 90% for 15 minutes
              (ZFS ARC counted as reclaimable). Risk of OOM kills.
          labels:
            severity: warning
            component: infrastructure

        - alert: ExternalHostFilesystemFull
          expr: |-
            (1 - (node_filesystem_avail_bytes{job="node-exporter", fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{job="node-exporter", fstype!~"tmpfs|overlay"})) * 100 > 85
          for: 10m
          keep_firing_for: 5m
          annotations:
            summary: "{{ $labels.instance }} {{ $labels.mountpoint }} is {{ $value | humanize }}% full"
            description: |-
              Filesystem {{ $labels.mountpoint }} ({{ $labels.device }}) on {{ $labels.instance }} is above 85%.
              Free up space or expand the volume.
          labels:
            severity: warning
            component: infrastructure

        - alert: ExternalHostFilesystemCritical
          expr: |-
            (1 - (node_filesystem_avail_bytes{job="node-exporter", fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{job="node-exporter", fstype!~"tmpfs|overlay"})) * 100 > 95
          for: 5m
          keep_firing_for: 5m
          annotations:
            summary: "CRITICAL: {{ $labels.instance }} {{ $labels.mountpoint }} is {{ $value | humanize }}% full"
            description: |-
              Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is critically full.
              Immediate action required to prevent service disruption.
          labels:
            severity: critical
            component: infrastructure

        - alert: ExternalHostRebootRequired
          expr: |-
            node_reboot_required{job="node-exporter"} == 1
          for: 24h
          annotations:
            summary: "Host {{ $labels.instance }} requires a reboot"
            description: |-
              {{ $labels.instance }} has required a reboot for over 24 hours (likely pending kernel update).
          labels:
            severity: warning
            component: infrastructure

    # Flow telemetry (nflo0 ntopng -> ClickHouse export health)
    # Watchdog for the silent-stall failure mode: ntopng stopped exporting
    # flows to ClickHouse after a 2026-06-02 reboot and went unnoticed for
    # ~2 weeks (host stayed healthy; only the data stopped). The freshness
    # gauge is emitted by a 60s node_exporter textfile timer on nflo0.
    - name: flow-telemetry.rules
      interval: 1m
      rules:
        - alert: NtopngFlowExportStale
          expr: |-
            (time() - ntopng_flows_last_seen_timestamp_seconds) > 900
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "ntopng flow export to ClickHouse is stale (nflo0)"
            description: |-
              No new flows written to the ntopng.flows ClickHouse table for
              {{ $value | humanizeDuration }} (threshold 15m). The ntopng->ClickHouse
              export on nflo0 has likely stalled — live capture (XDP/ERSPAN) can be
              fine while persistence is dead. Check ntopng on nflo0 and its
              ClickHouse export connection; a `systemctl restart ntopng` reconnects it.
            runbook_url: https://docs.victoriametrics.com/
          labels:
            severity: warning
            component: observability

        - alert: NtopngFlowFreshnessMetricMissing
          expr: |-
            absent(ntopng_flows_last_seen_timestamp_seconds)
          for: 15m
          keep_firing_for: 5m
          annotations:
            summary: "ntopng flow-freshness watchdog metric is missing"
            description: |-
              ntopng_flows_last_seen_timestamp_seconds is absent — the freshness
              exporter (ntopng-flow-freshness.timer on nflo0) or the nflo0
              node_exporter scrape is down, so flow-export health is unobservable.
              Check the timer on nflo0 and the node-exporter target for netflow.
          labels:
            severity: warning
            component: observability
